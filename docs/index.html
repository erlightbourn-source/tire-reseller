function milesBetween(a,b,c,d){ if([a,b,c,d].some(v=>typeof v!=='number')) return Infinity; const R=3958.8,rad=x=>x*Math.PI/180; const dLa=rad(c-a),dLo=rad(d-b); const h=Math.sin(dLa/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dLo/2)**2; return 2*R*Math.asin(Math.sqrt(h)); }

function matchSearch(l, p){
  if(p.state && l.state!==String(p.state).toUpperCase()) return false;
  if(p.brand && l.brand!==p.brand) return false;
  if(p.condition && l.condition!==p.condition) return false;
  if(p.size && !l.size.toLowerCase().includes(p.size.toLowerCase())) return false;
  if(p.season && l.season!==p.season) return false;
  if(p.runFlat==='1' && !l.runFlat) return false;
  if(p.maxPrice && l.priceCents>Math.round(Number(p.maxPrice)*100)) return false;
  if(p.q){ const Q=p.q.toLowerCase(); if(![l.brand,l.size,l.location,l.description].join(' ').toLowerCase().includes(Q)) return false; }
  return true;
}
function describeSearchDemo(p){ const a=[]; if(p.q)a.push(`"${p.q}"`); if(p.brand)a.push(p.brand); if(p.size)a.push(p.size); if(p.season)a.push(p.season); if(p.condition)a.push(p.condition==='new'?'New':'Used'); if(p.runFlat==='1')a.push('Run-flat'); if(p.maxPrice)a.push('under $'+p.maxPrice); if(p.state)a.push(stateName(p.state)); return a.length?a.join(' · '):'All tires'; }

const hashCode = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i) | 0; return h; };

function tireSVG(brand, size, condition, idx) {
  const palettes = [['#1f2937','#0b1220'],['#1e293b','#0a0f1a'],['#26211c','#100b07'],['#1b2530','#080d13']];
  const [c1, c2] = palettes[Math.abs(hashCode(brand + size)) % palettes.length];
  const spokes = 5 + (Math.abs(hashCode(size)) % 3);
  const u = 'g' + idx;
  const spokeShapes = Array.from({ length: spokes }).map((_, i) => {
    const a = (i / spokes) * 360;
    return `<g transform="rotate(${a})"><path d="M -16 -52 Q 0 -118 16 -52 L 22 -120 Q 0 -132 -22 -120 Z" fill="url(#${u}spoke)" stroke="#0b0e14" stroke-width="2"/></g>`;
  }).join('');
  const tread = Array.from({ length: 60 }).map((_, i) => {
    const a = (i / 60) * Math.PI * 2; const x = Math.cos(a) * 192, y = Math.sin(a) * 192;
    return `<rect x="${(x-7).toFixed(1)}" y="${(y-11).toFixed(1)}" width="14" height="22" rx="2" transform="rotate(${(a*180/Math.PI).toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)})" fill="#05070b"/>`;
  }).join('');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="${u}bg" cx="50%" cy="38%" r="75%"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></radialGradient>

    <radialGradient id="${u}rubber" cx="50%" cy="42%" r="60%"><stop offset="0" stop-color="#23262d"/><stop offset="1" stop-color="#0a0c10"/></radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#${u}bg)"/>
  <ellipse cx="400" cy="520" rx="220" ry="34" fill="#000" opacity="0.45"/>
  <g transform="translate(400,290)">
    <circle r="232" fill="url(#${u}rubber)"/>${tread}

    <text font-family="Arial" font-size="20" font-weight="700" fill="#e5e7eb" letter-spacing="3" opacity="0.85"><textPath href="#${u}arc" startOffset="50%" text-anchor="middle">${brand.toUpperCase()} · ${size}</textPath></text>

    <circle r="150" fill="#11141a"/><circle r="138" fill="url(#${u}rim)"/>${spokeShapes}

    <ellipse cx="-60" cy="-70" rx="120" ry="60" fill="#fff" opacity="0.06"/>
  </g></svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

    { id: cuid(), sellerId: demo.id, authorId: mike.id, rating: 4, body: 'Good communication, fair price.', createdAt: now - 12*864e5 },
    { id: cuid(), sellerId: demo.id, authorId: rosa.id, rating: 5, body: null, createdAt: now - 20*864e5 },
    { id: cuid(), sellerId: mike.id, authorId: buyer.id, rating: 4, body: 'Quick to respond.', createdAt: now - 8*864e5 },
    { id: cuid(), sellerId: rosa.id, authorId: buyer.id, rating: 5, body: 'Great seller!', createdAt: now - 3*864e5 },
  ];
  // view events over last 14 days for demo's listings
  const demoL = listings.filter(l => l.sellerId === demo.id);
  const views = [];
  for (let d=0; d<14; d++){ const dc = 1 + ((d*7+3)%9); for(let k=0;k<dc;k++){ const l = demoL[(d+k)%demoL.length]; views.push({ id: cuid(), listingId: l.id, createdAt: now - d*864e5 - k*36e5 }); } }
  // saved search for buyer
  const savedSearches = [{ id: cuid(), userId: buyer.id, query: 'season=winter', label: 'Winter', createdAt: now - 30*864e5, lastSeenAt: now - 30*864e5 }];
  // an offer in the conversation
  messages.push({ id: cuid(), threadId: thread.id, senderId: buyer.id, kind: 'offer', offerCents: 85000, offerStatus: 'pending', body: 'Offer: $850', createdAt: now });

  return { users: [demo, buyer, mike, rosa, ken], session: null, listings, threads: [thread], messages, favorites, reviews, views, savedSearches, reports: [], blocks: [] };
}

function loadDB() {
  try { const raw = localStorage.getItem(LS_KEY); if (raw) return JSON.parse(raw); } catch (e) {}

}

  const brands = useMemo(() => [...new Set(db.listings.filter(l => l.status==='active').map(l => l.brand))].sort(), [db]);

  let list = db.listings.filter(l => l.status === 'active' && !l.hidden && !blocked.includes(l.sellerId));
  if (st && !near) list = list.filter(l => l.state === st);
  if (brand) list = list.filter(l => l.brand === brand);

  if (maxPrice) list = list.filter(l => l.priceCents <= Math.round(Number(maxPrice) * 100));
  if (q) { const Q = q.toLowerCase(); list = list.filter(l => [l.brand,l.size,l.location,l.description].join(' ').toLowerCase().includes(Q)); }
  if (near) { const r = Number(radius); list = list.map(l=>({l,d:milesBetween(near.lat,near.lng,l.lat,l.lng)})).filter(x=>x.d<=r).sort((a,b)=>(b.l.featured-a.l.featured)||(proOf(b.l)-proOf(a.l))||(a.d-b.d)).map(x=>x.l); }

/* ───────────────────────── Listing detail ───────────────────────── */
function Detail({ id }) {
  const { db, me, recordView, startThread, sellerRating } = useApp();
  const l = db.listings.find(x => x.id === id);
  const viewed = useRef(false);
  useEffect(() => {
    if (l && !viewed.current && (!me || me.id !== l.sellerId)) { viewed.current = true; recordView(id); }
    if (l) { try { const prev = JSON.parse(localStorage.getItem('tt_recently_viewed')||'[]'); const next=[{id:l.id,brand:l.brand,size:l.size,priceCents:l.priceCents,photoIdx:l.photoIdx,condition:l.condition}, ...prev.filter(x=>x.id!==l.id)].slice(0,12); localStorage.setItem('tt_recently_viewed', JSON.stringify(next)); } catch(e){} }
  }, [id]);
  if (!l) return <Empty title="Listing not found" />;
  const seller = db.users.find(u => u.id === l.sellerId);
  const isOwner = me && me.id === l.sellerId;
  const isNew = l.condition === 'new';
  const threadCount = db.threads.filter(t => t.listingId === l.id).length;
  const sr = sellerRating(l.sellerId);
  return (
    <div className="space-y-4">
      <nav className="flex items-center gap-1.5 text-sm text-slate-400"><a href="#/" className="hover:text-brand-300">Marketplace</a><span>/</span><span className="truncate font-medium text-slate-200">{l.brand} {l.size}</span></nav>
      <div className="grid gap-6 lg:grid-cols-5">
        <div className="lg:col-span-3"><div className="aspect-[4/3] w-full overflow-hidden rounded-2xl border border-white/10 bg-ink-900"><img src={tireSVG(l.brand,l.size,l.condition,l.photoIdx)} alt="" className="h-full w-full object-cover" /></div></div>
        <div className="space-y-4 lg:col-span-2">
          <div className="card p-5">
            <div className="flex items-center justify-between gap-2">
              <div className="flex items-center gap-2">{l.featured && <span className="badge bg-accent-500 text-ink-950">★ Featured</span>}<span className={isNew?'badge-new':'badge-used'}>{isNew?'New':'Used'}</span>{l.status==='sold' && <span className="badge bg-ink-900 text-white">Sold</span>}</div>
              {!isOwner && <Heart lid={l.id} />}
            </div>
            <h1 className="mt-3 font-display text-2xl font-extrabold text-white">{l.brand}</h1>
            <p className="font-mono text-lg text-slate-400">{l.size}</p>
            <p className="mt-3 font-display text-4xl font-extrabold text-white">{fmt(l.priceCents)}<span className="ml-2 align-middle text-sm font-medium text-slate-500">for {l.quantity}</span></p>
            <dl className="mt-4 grid grid-cols-2 gap-2.5">
              <Spec k="Quantity" v={l.quantity} /><Spec k="Condition" v={isNew?'New':'Used'} /><Spec k="Tread depth" v={l.treadDepth||'—'} /><Spec k="Per tire" v={fmt(Math.round(l.priceCents/l.quantity))} />
              {l.season && <Spec k="Season" v={SEASON_LABEL[l.season]||l.season} />}
              {(l.loadIndex||l.speedRating) && <Spec k="Load / Speed" v={`${l.loadIndex||'—'}${l.speedRating||''}`} />}
              {l.runFlat && <Spec k="Run-flat" v="Yes" />}
              {l.dotYear && <Spec k="Mfg. year" v={`${l.dotYear} · ${new Date().getFullYear()-l.dotYear}y old`} />}
            </dl>
            <p className="mt-4 flex items-center gap-1.5 text-sm text-slate-400">📍 {l.location}</p>
          </div>
          {l.description && <div className="card p-5"><h2 className="text-sm font-bold text-slate-200">Description</h2><p className="mt-1.5 whitespace-pre-wrap text-sm leading-relaxed text-slate-400">{l.description}</p></div>}
          <a href={`#/sellers/${seller.id}`} className="card flex items-center gap-3 p-4 transition hover:border-white/20">
            <span className="grid h-11 w-11 place-items-center rounded-full bg-gradient-to-br from-brand-500 to-brand-700 font-bold text-white">{initials(seller.name)}</span>
            <div className="min-w-0 flex-1"><p className="truncate font-semibold text-white">{seller.name}</p><div className="flex items-center gap-1.5 text-xs text-slate-400"><Stars value={sr.avg} size="h-3 w-3" /><span>{sr.count?`${sr.avg.toFixed(1)} (${sr.count})`:'No reviews yet'}</span></div><p className="text-xs text-slate-500">{seller.location} · Listed {timeAgo(l.createdAt)}</p></div>
            <span className="text-slate-500">›</span>
          </a>
          {isOwner ? (
            <div className="card p-5"><p className="mb-3 text-sm font-bold text-slate-200">Your listing</p><div className="mb-4 grid grid-cols-2 gap-2.5"><Spec k="Views" v={l.views} /><Spec k="Conversations" v={threadCount} /></div>
              <div className="flex gap-2"><a href={`#/sell/${l.id}`} className="btn-secondary flex-1">Edit listing</a><DeleteBtn id={l.id} /></div></div>
          ) : me ? (
            <MessageSeller listing={l} />
          ) : (
            <div className="card p-5 text-center"><p className="text-sm text-slate-400">Log in to message the seller and make an offer.</p><a href="#/login" className="btn-primary mt-3 w-full">Log in to message</a></div>
          )}
          <div className="flex items-center justify-between gap-2 pt-1">
            <ShareBtn brand={l.brand} size={l.size} />
            {!isOwner && <ReportBtn lid={l.id} />}
          </div>
        </div>
      </div>
      {(() => {
        const cand = db.listings.filter(x => x.status==='active' && x.id!==l.id && (x.size===l.size || x.brand===l.brand));
        const similar = cand.sort((a,b)=>((b.size===l.size)-(a.size===l.size))||(b.featured-a.featured)).slice(0,4);
        return similar.length>0 ? (
          <div className="pt-2"><h2 className="mb-3 font-display text-lg font-bold text-white">More like this</h2><div className="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4">{similar.map(x=><Card key={x.id} l={x} />)}</div></div>
        ) : null;
      })()}
    </div>
  );
}
function Spec({ k, v }) { return <div className="rounded-xl bg-white/[0.04] px-3 py-2 ring-1 ring-inset ring-white/10"><dt className="text-xs text-slate-400">{k}</dt><dd className="font-semibold text-slate-100">{v}</dd></div>; }
function DeleteBtn({ id }) { const { update } = useApp(); return <button onClick={()=>{ if(confirm('Delete this listing?')){ update(d=>{ d.listings = d.listings.filter(l=>l.id!==id); }); navigate('/dashboard'); } }} className="btn-danger">Delete</button>; }

function MessageSeller({ listing }) {
  const { startThread } = useApp();
  const [open, setOpen] = useState(false);
  const [msg, setMsg] = useState('Hi! Is this set still available?');
  if (!open) return <button onClick={()=>setOpen(true)} className="btn-primary w-full py-3 text-base">💬 Message seller</button>;
  return (
    <div className="card space-y-2 p-4">
      <p className="text-sm font-semibold text-slate-200">Send a message</p>
      <textarea value={msg} onChange={e=>setMsg(e.target.value)} rows={3} className="input" />
      <div className="flex gap-2"><button onClick={()=>{ const tid = startThread(listing.id, msg); if(tid) navigate('/messages/'+tid); }} className="btn-primary flex-1">Send message</button><button onClick={()=>setOpen(false)} className="btn-secondary">Cancel</button></div>
    </div>
  );
}

        </div>
        <div className="bg-[#13161c] p-7 sm:p-9">
          <h1 className="font-display text-2xl font-bold text-white">{isSignup ? 'Create your account' : 'Log in'}</h1>

                <RoleCard active={role==='seller'} onClick={()=>setRole('seller')} title="Sell tires" sub="1st year free, then $10/mo" icon="🏷️" />

              {role==='seller' && <p className="mt-2 flex items-center gap-1.5 rounded-lg bg-emerald-500/10 px-3 py-2 text-xs text-emerald-300 ring-1 ring-inset ring-emerald-400/20"><span>✓</span>Your first year of selling is on us — $0 today, no card required.</p>}
            </div>}
            {isSignup && <div><label className="label">Full name</label><input name="name" required className="input" placeholder="Jordan Tires" /></div>}
            <div><label className="label">Email</label><input name="email" type="email" required className="input" placeholder="you@example.com" /></div>
            <div><label className="label">Password</label><input name="password" type="password" required minLength={6} className="input" placeholder="••••••••" /></div>

            </div>}
            <button className="btn-primary w-full">{isSignup ? 'Create account' : 'Log in'}</button>
          </form>
          {!isSignup && <div className="mt-4 rounded-xl bg-white/5 px-3 py-2.5 text-xs text-slate-400 ring-1 ring-inset ring-white/10"><span className="font-semibold text-slate-300">Demo:</span> demo@tiretrader.test / demo1234</div>}
          <p className="mt-5 text-center text-sm text-slate-400">{isSignup ? <>Already have an account? <a href="#/login" className="font-semibold text-brand-300 hover:underline">Log in</a></> : <>New here? <a href="#/signup" className="font-semibold text-brand-300 hover:underline">Create an account</a></>}</p>

  if (!me || status === 'free' || status === 'paid') return null;
  const expired = status === 'expired';
  const freeEnds = new Date(Date.now() + FREE_MS).toLocaleDateString();
  const feats = [['List unlimited tire sets','No per-listing fees, ever.'],['Built-in buyer messaging','Negotiate without sharing your number.'],['Seller activity dashboard','Track views, chats, and inventory value.'],['Manage everything','Edit, mark sold, and delete in a click.'],['Cancel anytime','No contracts. Keep it as long as it pays off.']];
  return (
    <div className="mx-auto max-w-lg">

        <div className="p-6">

          {expired

          <p className="mt-3 text-center text-xs text-slate-400">{expired ? '⚙️ Demo mode: checkout is simulated. The real app uses Stripe.' : "You won't be charged today — no card required."}</p>
        </div>
      </div>
    </div>
  );
}

/* ───────────────────────── Sell / listing form ───────────────────────── */
function Sell({ id }) {
  const { me, db, saveListing } = useApp();
  useEffect(() => { if (!me) navigate('/login'); }, [me]);
  if (!me) return null;
  if (!canSell(me)) { const expired = sellerStatus(me)==='expired'; return (
    <div className="mx-auto max-w-lg"><div className="card overflow-hidden text-center"><div className="relative overflow-hidden bg-ink-900 px-6 py-8 text-white"><div className="mesh absolute inset-0" /><span className="relative inline-grid h-14 w-14 place-items-center rounded-2xl bg-white/10 text-2xl ring-1 ring-white/15">{expired?'🔒':'🏷️'}</span><h1 className="relative mt-3 font-display text-xl font-bold">{expired?'Your free year has ended':'Become a seller to list tires'}</h1></div><div className="p-6"><p className="text-slate-400">{expired ? <>Continue listing and messaging buyers for <strong className="text-white">$10/month</strong>.</> : <>List unlimited tires, message buyers, and track activity — <strong className="text-white">free for your first year</strong>, then $10/month.</>}</p><a href="#/subscribe" className="btn-accent mt-4">{expired?'Subscribe — $10/mo':'Start selling free'}</a></div></div></div>
  ); }
  const editing = id ? db.listings.find(l => l.id === id && l.sellerId === me.id) : null;
  const [photoIdx] = useState(editing ? editing.photoIdx : Math.floor(Math.random()*14));
  function submit(e) {
    e.preventDefault();
    const f = Object.fromEntries(new FormData(e.target).entries());
    const nid = saveListing(editing ? editing.id : null, { ...f, photoIdx });
    navigate('/listings/' + nid);
  }
  return (
    <div className="mx-auto max-w-2xl">
      <div className="mb-4"><p className="eyebrow">{editing ? 'Edit listing' : 'New listing'}</p><h1 className="font-display text-2xl font-extrabold text-white">{editing ? 'Edit your listing' : 'List a set of tires'}</h1></div>
      <div className="card p-6">

  const mine = db.listings.filter(l => l.sellerId === me.id);
  const active = mine.filter(l => l.status === 'active');
  const sold = mine.filter(l => l.status === 'sold');
  const views = mine.reduce((s,l)=>s+l.views,0);
  const inv = active.reduce((s,l)=>s+l.priceCents*l.quantity,0);

  const unread = db.messages.filter(m => m.senderId !== me.id && convos.some(t => t.id === m.threadId) && !m.read).length;

  const maxDay = Math.max(1, ...chartDays.map(d=>d.count)); const views14 = chartDays.reduce((s,d)=>s+d.count,0);

/* ───────────────────────── Messages ───────────────────────── */
function Messages() {
  const { me, db, otherOf } = useApp();
  useEffect(() => { if (!me) navigate('/login'); }, [me]);
  if (!me) return null;
  const mine = db.threads.filter(t => t.buyerId === me.id || t.sellerId === me.id).sort((a,b)=>(lastTime(db,b)-lastTime(db,a)));
  return (
    <div className="mx-auto max-w-2xl">
      <div className="mb-4"><p className="eyebrow">Inbox</p><h1 className="font-display text-2xl font-extrabold text-white">Messages</h1></div>
      {mine.length === 0 ? <div className="card grid place-items-center px-6 py-14 text-center"><span className="grid h-14 w-14 place-items-center rounded-2xl bg-white/5 text-2xl">💬</span><p className="mt-3 font-display font-bold text-slate-200">No conversations yet</p><p className="text-sm text-slate-400">Message a seller from any listing to start chatting.</p><a href="#/browse" className="btn-secondary mt-4">Browse tires</a></div> : (
        <div className="space-y-2">{mine.map(t => {
          const l = db.listings.find(x=>x.id===t.listingId); const other = otherOf(t);
          const msgs = db.messages.filter(m=>m.threadId===t.id); const last = msgs[msgs.length-1];
          return (
            <a key={t.id} href={`#/messages/${t.id}`} className="card card-hover flex items-center gap-3 p-3">
              <div className="h-14 w-14 shrink-0 overflow-hidden rounded-lg bg-white/5 ring-1 ring-white/10"><img src={tireSVG(l.brand,l.size,l.condition,l.photoIdx)} alt="" className="h-full w-full object-cover" /></div>
              <div className="min-w-0 flex-1"><div className="flex items-center justify-between gap-2"><p className="truncate font-semibold text-white">{l.brand} · {l.size}</p><span className="whitespace-nowrap text-xs text-slate-400">{timeAgo(lastTime(db,t))}</span></div><p className="text-xs text-slate-500">{t.buyerId===me.id?'Seller':'Buyer'}: {other.name} · {fmt(l.priceCents)}</p><p className="truncate text-sm text-slate-500">{last ? last.body : 'No messages yet'}</p></div>
            </a>
          );
        })}</div>
      )}
    </div>
  );
}
function lastTime(db, t) { const m = db.messages.filter(x=>x.threadId===t.id); return m.length ? m[m.length-1].createdAt : t.createdAt; }

function Thread({ id }) {
  const { me, db, otherOf, sendMessage, makeOffer, respondOffer, markThreadRead } = useApp();
  const [text, setText] = useState('');
  const [offerOpen, setOfferOpen] = useState(false);
  const [counterFor, setCounterFor] = useState(null); const [counterAmt, setCounterAmt] = useState('');
  const t = db.threads.find(x => x.id === id);
  useEffect(() => { if (me && t) markThreadRead(t.id); }, [id, me]);
  const offerExp = (m) => { const left = OFFER_TTL_MS-(Date.now()-m.createdAt); if(left<=0) return {expired:true,label:'Expired'}; const h=Math.floor(left/3.6e6); return {expired:false,label:h>=1?`Expires in ${h}h`:'Expires soon'}; };
  const [offer, setOffer] = useState(t ? Math.round((db.listings.find(x=>x.id===t.listingId)?.priceCents||0)/100) : '');
  const bottom = useRef(null);
  useEffect(() => { if (!me) navigate('/login'); }, [me]);
  const msgs = t ? db.messages.filter(m => m.threadId === t.id) : [];
  useEffect(() => { bottom.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs.length]);
  if (!me) return null;
  if (!t) return <Empty title="Conversation not found" />;
  const l = db.listings.find(x => x.id === t.listingId); const other = otherOf(t);
  function send(e) { e.preventDefault(); if (!text.trim()) return; sendMessage(t.id, text.trim()); setText(''); }
  const money = (c) => '$'+(c/100).toLocaleString();
  return (
    <div className="mx-auto max-w-2xl">
      <a href="#/messages" className="text-sm text-brand-300 hover:underline">← All messages</a>
      <a href={`#/listings/${l.id}`} className="card mt-2 flex items-center gap-3 p-3 transition hover:border-white/20"><div className="h-12 w-12 shrink-0 overflow-hidden rounded-lg bg-white/5 ring-1 ring-white/10"><img src={tireSVG(l.brand,l.size,l.condition,l.photoIdx)} alt="" className="h-full w-full object-cover" /></div><div className="min-w-0 flex-1"><p className="truncate font-semibold text-white">{l.brand} · {l.size}</p><p className="text-sm text-slate-400">{fmt(l.priceCents)} · with {other.name}</p></div></a>
      <div className="card mt-3 flex h-[60vh] flex-col overflow-hidden">
        <div className="flex-1 space-y-2 overflow-y-auto bg-black/20 p-4">
          {msgs.length===0 && <p className="mt-10 text-center text-sm text-slate-500">Start the conversation with {other.name}.</p>}
          {msgs.map(m => { const mine = m.senderId===me.id; const isOffer = m.kind==='offer'; return (
            <div key={m.id} className={`flex ${mine?'justify-end':'justify-start'}`}>
              {isOffer ? (()=>{ const exp=offerExp(m); const live=m.offerStatus==='pending'&&!exp.expired; return (
                <div className={`max-w-[80%] rounded-2xl border p-3 ${m.offerStatus==='accepted'?'border-emerald-400/40 bg-emerald-500/10':(m.offerStatus==='declined'||m.offerStatus==='countered'||exp.expired)?'border-white/10 bg-white/5 opacity-70':'border-accent-400/40 bg-accent-500/10'}`}>
                  <p className="text-xs font-semibold uppercase tracking-wide text-accent-300">{mine?'Your offer':'Offer'}</p>
                  <p className="font-display text-2xl font-extrabold text-white">{money(m.offerCents)}</p>
                  {m.offerStatus==='accepted' && <p className="text-xs font-semibold text-emerald-300">✓ Accepted</p>}
                  {m.offerStatus==='declined' && <p className="text-xs text-slate-400">Declined</p>}
                  {m.offerStatus==='countered' && <p className="text-xs text-slate-400">Countered</p>}
                  {live && <p className="text-[10px] text-slate-400">{exp.label}</p>}
                  {m.offerStatus==='pending' && exp.expired && <p className="text-xs text-slate-400">Expired</p>}
                  {live && !mine && counterFor!==m.id && <div className="mt-2 flex flex-wrap gap-2"><button onClick={()=>respondOffer(m.id,'accept')} className="btn bg-emerald-500 px-3 py-1 text-xs text-ink-950 hover:bg-emerald-400">Accept</button><button onClick={()=>{ setCounterFor(m.id); setCounterAmt(Math.round(m.offerCents/100)); }} className="btn bg-brand-600 px-3 py-1 text-xs text-white hover:bg-brand-500">Counter</button><button onClick={()=>respondOffer(m.id,'decline')} className="btn bg-white/10 px-3 py-1 text-xs text-slate-200 hover:bg-white/20">Decline</button></div>}
                  {live && !mine && counterFor===m.id && <div className="mt-2 flex items-center gap-1.5"><span className="text-xs text-slate-300">$</span><input type="number" value={counterAmt} onChange={e=>setCounterAmt(e.target.value)} className="input max-w-[100px] py-1 text-sm" /><button onClick={()=>respondOffer(m.id,'counter',Math.round(Number(counterAmt)*100))} className="btn bg-brand-600 px-3 py-1 text-xs text-white">Send</button><button onClick={()=>setCounterFor(null)} className="btn-ghost px-2 py-1 text-xs">✕</button></div>}
                  {live && mine && <p className="text-xs text-slate-400">Waiting for a response…</p>}
                  <div className="mt-1 text-[10px] text-slate-400">{new Date(m.createdAt).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}</div>
                </div>
              ); })() : (
                <div className={`max-w-[78%] rounded-2xl px-3.5 py-2 text-sm ${mine?'rounded-br-md bg-brand-600 text-white':'rounded-bl-md bg-white/[0.07] text-slate-100 ring-1 ring-white/10'}`}>{m.body}<div className={`mt-0.5 text-[10px] ${mine?'text-brand-100':'text-slate-500'}`}>{new Date(m.createdAt).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}</div></div>
              )}
            </div>
          ); })}
          <div ref={bottom} />
        </div>
        {offerOpen && <div className="flex items-center gap-2 border-t border-white/10 bg-accent-500/5 p-3"><span className="text-sm text-slate-300">Offer $</span><input type="number" min="1" value={offer} onChange={e=>setOffer(e.target.value)} className="input max-w-[140px]" /><button onClick={()=>{ const c=Math.round(Number(offer)*100); if(c>0){ makeOffer(t.id,c); setOfferOpen(false); } }} className="btn-accent px-4">Send offer</button><button onClick={()=>setOfferOpen(false)} className="btn-ghost px-3">Cancel</button></div>}
        <form onSubmit={send} className="flex gap-2 border-t border-white/10 bg-white/[0.02] p-3"><button type="button" onClick={()=>setOfferOpen(o=>!o)} className="btn-secondary px-3" title="Make an offer"><svg viewBox="0 0 20 20" className="h-5 w-5 fill-current"><path d="M10 1l2 2h3a2 2 0 0 1 2 2v3l2 2-2 2v3a2 2 0 0 1-2 2h-3l-2 2-2-2H5a2 2 0 0 1-2-2v-3l-2-2 2-2V5a2 2 0 0 1 2-2h3l2-2Zm-1 5v2H7v2h2v2h2v-2h2V8h-2V6H9Z"/></svg></button><input value={text} onChange={e=>setText(e.target.value)} placeholder="Type a message…" className="input" /><button className="btn-primary px-4">Send</button></form>
      </div>
    </div>
  );
}

/* ───────────────────────── Root app + actions ───────────────────────── */
function App() {
  const [db, setDb] = useState(loadDB);
  const route = useHashRoute();
  const persist = (next) => { localStorage.setItem(LS_KEY, JSON.stringify(next)); setDb(next); };
  const update = (mutator) => { const next = JSON.parse(JSON.stringify(db)); mutator(next); persist(next); };
  const me = db.users.find(u => u.id === db.session) || null;

  const actions = {
    db, me,
    login: ({ email, password }) => { const u = db.users.find(x => x.email === (email||'').toLowerCase()); if (!u || u.password !== password) return { error: 'Invalid email or password.' }; update(d => { d.session = u.id; }); return {}; },
    signup: ({ email, password, name, location, role, state }) => { email=(email||'').toLowerCase(); if (!name||!email||!password) return {error:'Name, email and password are required.'}; if (password.length<6) return {error:'Password must be at least 6 characters.'}; if (db.users.some(u=>u.email===email)) return {error:'An account with that email already exists.'}; const isSeller = role==='seller'; const u={id:cuid(),email,password,name,location:location||null,state:isStateAbbr(state)?state.toUpperCase():null,role:isSeller?'seller':'buyer',sellerFreeUntil:isSeller?Date.now()+FREE_MS:null,subscriptionStatus:'inactive'}; update(d=>{ d.users.push(u); d.session=u.id; }); return {}; },
    setUserState: (abbr) => update(d => { const u = d.users.find(x=>x.id===d.session); if (u && isStateAbbr(abbr)) u.state = abbr.toUpperCase(); }),
    logout: () => { update(d => { d.session = null; }); navigate('/'); },
    becomeSeller: () => update(d => { const u = d.users.find(x=>x.id===d.session); if (u && !(sellerStatus(u)==='free'||sellerStatus(u)==='paid')) { u.role='seller'; u.sellerFreeUntil = u.sellerFreeUntil || (Date.now()+FREE_MS); } }),
    subscribe: () => update(d => { const u = d.users.find(x=>x.id===d.session); if (u) u.subscriptionStatus = 'active'; }),
    update,
    otherOf: (t) => db.users.find(u => u.id === (t.buyerId === db.session ? t.sellerId : t.buyerId)),
    startThread: (listingId, message) => {
      const l = db.listings.find(x => x.id === listingId); if (!l || l.sellerId === db.session) return null;
      if ((db.blocks||[]).some(b => (b.blockerId===db.session && b.blockedId===l.sellerId) || (b.blockerId===l.sellerId && b.blockedId===db.session))) { alert("You can't message this seller."); return null; }
      let existing = db.threads.find(t => t.listingId === listingId && t.buyerId === db.session);
      let tid = existing ? existing.id : cuid();
      update(d => {
        if (!existing) d.threads.push({ id: tid, listingId, buyerId: d.session, sellerId: l.sellerId, createdAt: Date.now() });
        if (message && message.trim()) d.messages.push({ id: cuid(), threadId: tid, senderId: d.session, body: message.trim(), createdAt: Date.now() });
      });
      scheduleReply(tid, l.sellerId);
      return tid;
    },
    sendMessage: (tid, body) => { const th = db.threads.find(t=>t.id===tid); update(d => { d.messages.push({ id: cuid(), threadId: tid, senderId: d.session, body, createdAt: Date.now() }); }); if (th) { const otherId = th.buyerId === db.session ? th.sellerId : th.buyerId; scheduleReply(tid, otherId); } },
    saveListing: (id, f) => {
      const co = CITY_COORDS[f.location] || [null, null];
      const SEASONS = ['summer','winter','all-season','all-weather'];
      const data = { brand:f.brand, size:f.size, quantity:Math.max(1,parseInt(f.quantity)||1), condition:f.condition==='new'?'new':'used', treadDepth:f.treadDepth||null, priceCents:Math.round(Number(f.price)*100), location:f.location, state:stateFromLocation(f.location), lat:co[0], lng:co[1], season:SEASONS.includes(f.season)?f.season:null, loadIndex:f.loadIndex?String(f.loadIndex).trim():null, speedRating:f.speedRating?String(f.speedRating).trim().toUpperCase():null, runFlat:!!f.runFlat, dotYear:f.dotYear&&Number(f.dotYear)?Math.round(Number(f.dotYear)):null, description:f.description||null, status:f.status==='sold'?'sold':'active', photoIdx:f.photoIdx };
      let nid = id;
      update(d => { if (id) { const l = d.listings.find(x=>x.id===id); Object.assign(l, data); } else { nid = cuid(); d.listings.unshift({ id:nid, sellerId:d.session, views:0, featured:false, createdAt:Date.now(), ...data }); } });
      return nid;
    },
    isFavorited: (lid) => !!(db.favorites||[]).find(x=>x.userId===db.session && x.listingId===lid),
    toggleFavorite: (lid) => { if(!db.session){ navigate('/login'); return; } update(d => { d.favorites = d.favorites||[]; const i = d.favorites.findIndex(x=>x.userId===d.session && x.listingId===lid); if(i>=0) d.favorites.splice(i,1); else d.favorites.push({ userId:d.session, listingId:lid }); }); },
    togglePromote: (lid) => update(d => { const l = d.listings.find(x=>x.id===lid); if(l) l.featured = !l.featured; }),
    markThreadRead: (tid) => update(d => { d.messages.forEach(m => { if(m.threadId===tid && m.senderId!==d.session) m.read = true; }); }),
    report: (lid, reason) => { if(!db.session){ navigate('/login'); return {error:'login'}; } update(d => { d.reports = d.reports||[]; if(!d.reports.find(r=>r.listingId===lid && r.reporterId===d.session)) d.reports.push({ id:cuid(), listingId:lid, reporterId:d.session, reason }); const cnt = d.reports.filter(r=>r.listingId===lid).length; if(cnt>=3){ const l=d.listings.find(x=>x.id===lid); if(l) l.hidden=true; } }); return {}; },
    isBlocked: (uid) => !!(db.blocks||[]).find(b=>b.blockerId===db.session && b.blockedId===uid),
    blockedByMe: () => (db.blocks||[]).filter(b=>b.blockerId===db.session).map(b=>b.blockedId),
    toggleBlock: (uid) => update(d => { d.blocks = d.blocks||[]; const i=d.blocks.findIndex(b=>b.blockerId===d.session && b.blockedId===uid); if(i>=0) d.blocks.splice(i,1); else d.blocks.push({ id:cuid(), blockerId:d.session, blockedId:uid }); }),
    setPro: (on) => update(d => { const u=d.users.find(x=>x.id===d.session); if(u) u.pro=!!on; }),
    bulkAdd: (text) => { const lines=String(text||'').split('\n').map(l=>l.trim()).filter(Boolean); let count=0, errors=0; update(d => { for(const ln of lines.slice(0,50)){ const p=ln.split('|').map(s=>s.trim()); const [brand,size,price,qty,cond,loc]=p; if(!brand||!size||!price||!loc){ errors++; continue; } const co=CITY_COORDS[loc]||[null,null]; d.listings.unshift({ id:cuid(), sellerId:d.session, brand, size, quantity:Math.max(1,parseInt(qty)||4), condition:cond==='new'?'new':'used', treadDepth:null, priceCents:Math.round(Number(price)*100)||0, location:loc, state:stateFromLocation(loc), lat:co[0], lng:co[1], season:null, runFlat:false, featured:false, hidden:false, views:0, createdAt:Date.now(), photoIdx:Math.floor(Math.random()*14) }); count++; } }); return { count, errors }; },
    sellerRating: (sid) => { const rs = (db.reviews||[]).filter(r=>r.sellerId===sid); return { avg: rs.length? rs.reduce((s,r)=>s+r.rating,0)/rs.length : 0, count: rs.length, list: rs.slice().sort((a,b)=>b.createdAt-a.createdAt) }; },
    myReview: (sid) => (db.reviews||[]).find(r=>r.sellerId===sid && r.authorId===db.session) || null,
    addReview: (sid, rating, body) => { if(!db.session) { navigate('/login'); return {error:'login'}; } update(d => { d.reviews = d.reviews||[]; const ex = d.reviews.find(r=>r.sellerId===sid && r.authorId===d.session); if(ex){ ex.rating=rating; ex.body=body||null; } else d.reviews.push({ id:cuid(), sellerId:sid, authorId:d.session, rating, body:body||null, createdAt:Date.now() }); }); return {}; },
    recordView: (lid) => update(d => { d.views = d.views||[]; d.views.push({ id:cuid(), listingId:lid, createdAt:Date.now() }); const l=d.listings.find(x=>x.id===lid); if(l) l.views=(l.views||0)+1; }),
    saveSearch: (query) => { if(!db.session){ navigate('/login'); return; } const sp=new URLSearchParams(query); const allow=['q','brand','condition','size','maxPrice','season','runFlat','state']; const p={}; allow.forEach(k=>{ if(sp.get(k)) p[k]=sp.get(k); }); const clean=new URLSearchParams(p).toString(); const label=describeSearchDemo(p); update(d=>{ d.savedSearches=d.savedSearches||[]; if(!d.savedSearches.find(s=>s.userId===d.session && s.query===clean)) d.savedSearches.push({ id:cuid(), userId:d.session, query:clean, label, createdAt:Date.now(), lastSeenAt:Date.now() }); }); },
    deleteSearch: (id) => update(d => { d.savedSearches = (d.savedSearches||[]).filter(s=>s.id!==id); }),
    seenSearch: (id) => update(d => { const s=(d.savedSearches||[]).find(x=>x.id===id); if(s) s.lastSeenAt=Date.now(); }),
    newCount: (s) => { const p=Object.fromEntries(new URLSearchParams(s.query)); return db.listings.filter(l=>l.status==='active' && matchSearch(l,p) && l.createdAt>s.lastSeenAt).length; },
    makeOffer: (tid, cents) => update(d => { d.messages.push({ id:cuid(), threadId:tid, senderId:d.session, kind:'offer', offerCents:cents, offerStatus:'pending', body:`Offer: $${(cents/100).toLocaleString()}`, createdAt:Date.now() }); const th=d.threads.find(t=>t.id===tid); if(th) th.updatedAt=Date.now(); }),
    respondOffer: (mid, action, cents) => update(d => { const m=d.messages.find(x=>x.id===mid); if(!m||m.kind!=='offer'||m.offerStatus!=='pending') return; if(action==='counter'){ if(!cents||cents<=0) return; m.offerStatus='countered'; d.messages.push({ id:cuid(), threadId:m.threadId, senderId:d.session, kind:'offer', offerCents:cents, offerStatus:'pending', body:`Counter-offer: $${(cents/100).toLocaleString()}`, createdAt:Date.now() }); return; } const acc=action==='accept'; m.offerStatus=acc?'accepted':'declined'; d.messages.push({ id:cuid(), threadId:m.threadId, senderId:d.session, body: acc?`✅ Accepted your offer of $${(m.offerCents/100).toLocaleString()}. Let's arrange pickup!`:`Declined the offer of $${(m.offerCents/100).toLocaleString()}.`, createdAt:Date.now() }); if(acc){ const th=d.threads.find(t=>t.id===m.threadId); const l=th&&d.listings.find(x=>x.id===th.listingId); if(l) l.status='sold'; } }),
    reset: () => { const fresh = seedDB(); persist(fresh); navigate('/'); },
  };

  // canned auto-reply so conversations feel alive
  const replyTimers = useRef({});
  function scheduleReply(tid, fromUserId) {
    if (replyTimers.current[tid]) return;
    replyTimers.current[tid] = setTimeout(() => {
      replyTimers.current[tid] = null;
      const lines = ["Thanks for reaching out! Yep, still available.", "Sounds good — when works for pickup?", "I can do a small discount for cash. 👍", "Let me grab a few more photos for you."];
      setDb(prev => { const next = JSON.parse(JSON.stringify(prev)); const last = next.messages.filter(m=>m.threadId===tid).slice(-1)[0]; if (last && last.senderId === fromUserId) return prev; next.messages.push({ id: cuid(), threadId: tid, senderId: fromUserId, body: lines[Math.floor(Date.now()/1000)%lines.length], createdAt: Date.now() }); localStorage.setItem(LS_KEY, JSON.stringify(next)); return next; });
    }, 1400);
  }

  let view;
  const [routePath, routeQuery] = route.split('?');
  const qp = new URLSearchParams(routeQuery || '');
  const seg = routePath.split('/').filter(Boolean);
  if (routePath === '/' || seg.length === 0) view = <Landing />;
  else if (seg[0] === 'states') view = <Landing force />;
  else if (seg[0] === 'browse') view = <Marketplace params={qp} />;
  else if (seg[0] === 'favorites') view = <Favorites />;
  else if (seg[0] === 'saved') view = <SavedSearches />;
  else if (seg[0] === 'sellers' && seg[1]) view = <SellerProfile id={seg[1]} />;
  else if (seg[0] === 'app') view = <AppPage />;
  else if (seg[0] === 'listings' && seg[1]) view = <Detail id={seg[1]} />;
  else if (seg[0] === 'login') view = <Auth mode="login" />;
  else if (seg[0] === 'signup') view = <Auth mode="signup" />;
  else if (seg[0] === 'subscribe') view = <Subscribe />;
  else if (seg[0] === 'pro') view = <ProPage />;
  else if (seg[0] === 'sell' && seg[1] === 'bulk') view = <BulkAddPage />;
  else if (seg[0] === 'sell') view = <Sell id={seg[1]} />;
  else if (seg[0] === 'dashboard') view = <Dashboard />;
  else if (seg[0] === 'messages' && seg[1]) view = <Thread id={seg[1]} />;
  else if (seg[0] === 'messages') view = <Messages />;
  else view = <Empty title="Page not found" />;

  return (
    <Ctx.Provider value={actions}>
      <div className="flex min-h-screen flex-col">
        <Header />
        <main className="mx-auto w-full max-w-6xl flex-1 px-4 py-6 sm:py-8">{view}</main>
        <Footer />
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
