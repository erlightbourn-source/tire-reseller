  <script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useReducer, createContext, useContext } = React;

/* ───────────────────────── Data layer (localStorage) ───────────────────────── */
const LS_KEY = 'tiretrader_demo_v4';
const GRID_ROWS = 8, GRID_COLS = 11;
const STATES = [
  ['ME','Maine',0,10],['VT','Vermont',1,9],['NH','New Hampshire',1,10],
  ['WA','Washington',2,0],['ID','Idaho',2,1],['MT','Montana',2,2],['ND','North Dakota',2,3],['MN','Minnesota',2,4],['WI','Wisconsin',2,5],['MI','Michigan',2,6],['NY','New York',2,8],['MA','Massachusetts',2,9],
  ['OR','Oregon',3,0],['NV','Nevada',3,1],['WY','Wyoming',3,2],['SD','South Dakota',3,3],['IA','Iowa',3,4],['IL','Illinois',3,5],['IN','Indiana',3,6],['OH','Ohio',3,7],['PA','Pennsylvania',3,8],['NJ','New Jersey',3,9],['CT','Connecticut',3,10],
  ['CA','California',4,0],['UT','Utah',4,1],['CO','Colorado',4,2],['NE','Nebraska',4,3],['MO','Missouri',4,4],['KY','Kentucky',4,5],['WV','West Virginia',4,6],['VA','Virginia',4,7],['MD','Maryland',4,8],['DE','Delaware',4,9],['RI','Rhode Island',4,10],
  ['AZ','Arizona',5,1],['NM','New Mexico',5,2],['KS','Kansas',5,3],['AR','Arkansas',5,4],['TN','Tennessee',5,5],['NC','North Carolina',5,6],['SC','South Carolina',5,7],['DC','Washington, D.C.',5,8],
  ['TX','Texas',6,2],['OK','Oklahoma',6,3],['LA','Louisiana',6,4],['MS','Mississippi',6,5],['AL','Alabama',6,6],['GA','Georgia',6,7],
  ['HI','Hawaii',7,0],['AK','Alaska',7,1],['FL','Florida',7,8],
].map(([abbr,name,row,col])=>({abbr,name,row,col}));
const STATE_BY = Object.fromEntries(STATES.map(s=>[s.abbr,s]));
const stateName = (a) => (STATE_BY[a]||{}).name || a;
const isStateAbbr = (a) => !!STATE_BY[(a||'').toUpperCase()];
function stateFromLocation(loc){ if(!loc) return null; const text=String(loc).trim(); const tail=text.split(',').pop().trim(); const up=tail.toUpperCase(); if(STATE_BY[up]) return up; const byName=STATES.find(s=>s.name.toLowerCase()===tail.toLowerCase()||s.name.toLowerCase()===text.toLowerCase()); return byName?byName.abbr:null; }
function userStateOf(u){ if(!u) return null; if(u.state && isStateAbbr(u.state)) return u.state.toUpperCase(); return stateFromLocation(u.location); }
const cuid = () => 'id' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
const hashCode = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i) | 0; return h; };

function tireSVG(brand, size, condition, idx) {
  const palettes = [['#1f2937','#0b1220'],['#1e293b','#0a0f1a'],['#26211c','#100b07'],['#1b2530','#080d13']];
  const [c1, c2] = palettes[Math.abs(hashCode(brand + size)) % palettes.length];
  const spokes = 5 + (Math.abs(hashCode(size)) % 3);
  const u = 'g' + idx;
  const spokeShapes = Array.from({ length: spokes }).map((_, i) => {
    const a = (i / spokes) * 360;
    return `<g transform="rotate(${a})"><path d="M -16 -52 Q 0 -118 16 -52 L 22 -120 Q 0 -132 -22 -120 Z" fill="url(#${u}spoke)" stroke="#0b0e14" stroke-width="2"/></g>`;
  }).join('');
  const tread = Array.from({ length: 60 }).map((_, i) => {
    const a = (i / 60) * Math.PI * 2; const x = Math.cos(a) * 192, y = Math.sin(a) * 192;
    return `<rect x="${(x-7).toFixed(1)}" y="${(y-11).toFixed(1)}" width="14" height="22" rx="2" transform="rotate(${(a*180/Math.PI).toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)})" fill="#05070b"/>`;
  }).join('');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="${u}bg" cx="50%" cy="38%" r="75%"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></radialGradient>
    <radialGradient id="${u}rim" cx="42%" cy="36%" r="70%"><stop offset="0" stop-color="#e8edf5"/><stop offset="0.55" stop-color="#aab4c4"/><stop offset="1" stop-color="#5b6675"/></radialGradient>
    <linearGradient id="${u}spoke" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dfe5ee"/><stop offset="1" stop-color="#8b95a6"/></linearGradient>
    <radialGradient id="${u}rubber" cx="50%" cy="42%" r="60%"><stop offset="0" stop-color="#23262d"/><stop offset="1" stop-color="#0a0c10"/></radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#${u}bg)"/>
  <ellipse cx="400" cy="520" rx="220" ry="34" fill="#000" opacity="0.45"/>
  <g transform="translate(400,290)">
    <circle r="232" fill="url(#${u}rubber)"/>${tread}
    <circle r="205" fill="#0c0e12"/>
    <text font-family="Arial" font-size="20" font-weight="700" fill="#e5e7eb" letter-spacing="3" opacity="0.85"><textPath href="#${u}arc" startOffset="50%" text-anchor="middle">${brand.toUpperCase()} · ${size}</textPath></text>
    <path id="${u}arc" d="M -176 0 A 176 176 0 0 1 176 0" fill="none"/>
    <circle r="150" fill="#11141a"/><circle r="138" fill="url(#${u}rim)"/>${spokeShapes}
    <circle r="44" fill="#1a1e26"/><circle r="14" fill="#0b0e14"/>
    <ellipse cx="-60" cy="-70" rx="120" ry="60" fill="#fff" opacity="0.06"/>
  </g></svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

const FREE_MS = 365 * 864e5; // one free year of selling

function seedDB() {
  const now = Date.now();
  const mkUser = (email, name, location, role) => ({ id: cuid(), email, password: email.startsWith('demo') ? 'demo1234' : (email.startsWith('buyer') ? 'buyer1234' : 'seller1234'), name, location, state: stateFromLocation(location), role, sellerFreeUntil: role === 'seller' ? now + FREE_MS : null, subscriptionStatus: 'inactive' });
  const demo = mkUser('demo@tiretrader.test', 'Demo Seller', 'Dallas, TX', 'seller');
  const buyer = mkUser('buyer@tiretrader.test', 'Sam Buyer', 'Fort Worth, TX', 'buyer');
  const mike = mkUser('mike@tiretrader.test', "Mike's Tire Co", 'Houston, TX', 'seller');
  const rosa = mkUser('rosa@tiretrader.test', 'Rosa Wheels', 'Phoenix, AZ', 'seller');
  const ken = mkUser('ken@tiretrader.test', 'Ken Auto', 'Atlanta, GA', 'seller');
  const sellers = [demo, mike, rosa, ken];

  const catalog = [
    { brand:'Michelin', model:'Pilot Sport 4S', size:'245/40R18', cond:'new', tread:'10/32in', qty:4, price:920, loc:'Dallas, TX', desc:'Brand new set of 4, never mounted. Summer performance.' },
    { brand:'Goodyear', model:'Eagle F1', size:'225/45R17', cond:'used', tread:'7/32in', qty:4, price:340, loc:'Los Angeles, CA', desc:'One season on these. Even wear, no patches or plugs.' },
    { brand:'Bridgestone', model:'Blizzak WS90', size:'205/55R16', cond:'used', tread:'8/32in', qty:4, price:280, loc:'Chicago, IL', desc:'Winter tires, two seasons. Stored indoors.' },
    { brand:'BFGoodrich', model:'All-Terrain T/A KO2', size:'265/70R17', cond:'new', tread:'15/32in', qty:5, price:1150, loc:'Phoenix, AZ', desc:'Full set of 5 including spare. Truck/SUV all-terrain.' },
    { brand:'Continental', model:'ExtremeContact DWS06', size:'245/45R18', cond:'used', tread:'6/32in', qty:2, price:160, loc:'Atlanta, GA', desc:'Pair of 2 fronts. Good rubber left.' },
    { brand:'Pirelli', model:'P Zero', size:'275/35R19', cond:'used', tread:'5/32in', qty:4, price:420, loc:'Houston, TX', desc:'Staggered rear pair available too. DM me.' },
    { brand:'Cooper', model:'Discoverer AT3', size:'265/65R18', cond:'new', tread:'14/32in', qty:4, price:760, loc:'Denver, CO', desc:'New takeoffs from a new truck, 20 miles.' },
    { brand:'Hankook', model:'Kinergy GT', size:'215/60R16', cond:'used', tread:'9/32in', qty:4, price:220, loc:'Miami, FL', desc:'Plenty of tread, all-season touring.' },
    { brand:'Falken', model:'Wildpeak A/T3W', size:'285/70R17', cond:'new', tread:'16/32in', qty:4, price:980, loc:'Seattle, WA', desc:'Aggressive all-terrain, brand new.' },
    { brand:'Toyo', model:'Proxes Sport', size:'255/40R19', cond:'used', tread:'6/32in', qty:4, price:380, loc:'New York, NY', desc:'Sticky summer set, lots of grip remaining.' },
    { brand:'Yokohama', model:'AVID Ascend GT', size:'225/65R17', cond:'new', tread:'11/32in', qty:4, price:540, loc:'Phoenix, AZ', desc:'New set, all-season SUV.' },
    { brand:'Firestone', model:'WeatherGrip', size:'235/55R17', cond:'used', tread:'7/32in', qty:4, price:260, loc:'Charlotte, NC', desc:'Great all-weather set. Smooth and quiet.' },
    { brand:'Michelin', model:'Defender T+H', size:'215/55R17', cond:'used', tread:'8/32in', qty:4, price:300, loc:'Dallas, TX', desc:'Long-life touring tires, low miles.' },
    { brand:'Goodyear', model:'Wrangler DuraTrac', size:'275/55R20', cond:'new', tread:'17/32in', qty:4, price:1240, loc:'Nashville, TN', desc:'Heavy duty, brand new set for full-size trucks.' },
  ];
  const listings = catalog.map((c, i) => {
    const seller = sellers[i % sellers.length];
    return {
      id: cuid(), sellerId: seller.id, brand: c.brand, size: c.size, quantity: c.qty,
      condition: c.cond, treadDepth: c.tread, priceCents: c.price * 100, location: c.loc,
      state: stateFromLocation(c.loc),
      description: `${c.model}. ${c.desc}`, status: i === 5 ? 'sold' : 'active',
      views: (i * 13 + 4) % 90, createdAt: now - ((i * 37) % 60) * 864e5, photoIdx: i,
    };
  });

  // sample conversation between buyer and demo on demo's first listing
  const target = listings.find((l) => l.sellerId === demo.id);
  const thread = { id: cuid(), listingId: target.id, buyerId: buyer.id, sellerId: demo.id, createdAt: now - 6 * 36e5 };
  const convo = [[buyer.id,'Hey! Are these still available?'],[demo.id,'Yep, all 4 are here. Never mounted.'],[buyer.id,'Would you take $850 cash?'],[demo.id,"Could do $880, they're basically new."],[buyer.id,'Deal. Can I pick up this weekend?'],[buyer.id,'Also — do you have the original box?']];
  let t = now - 6 * 36e5;
  const messages = convo.map(([senderId, body]) => { t += 22 * 60e3; return { id: cuid(), threadId: thread.id, senderId, body, createdAt: t }; });

  return { users: [demo, buyer, mike, rosa, ken], session: null, listings, threads: [thread], messages };
}

function loadDB() {
  try { const raw = localStorage.getItem(LS_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
  const fresh = seedDB(); localStorage.setItem(LS_KEY, JSON.stringify(fresh)); return fresh;
}

/* ───────────────────────── App context / router ───────────────────────── */
const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

function useHashRoute() {
  const [hash, setHash] = useState(() => window.location.hash || '#/');
  useEffect(() => {
    const on = () => { setHash(window.location.hash || '#/'); window.scrollTo(0, 0); };
    window.addEventListener('hashchange', on); return () => window.removeEventListener('hashchange', on);
  }, []);
  return hash.replace(/^#/, '') || '/';
}
const navigate = (p) => { window.location.hash = '#' + p; };

const fmt = (cents) => (cents / 100).toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: cents % 100 === 0 ? 0 : 2 });
function timeAgo(d) {
  const s = Math.floor((Date.now() - d) / 1000);
  const u = [['year',31536000],['month',2592000],['week',604800],['day',86400],['hour',3600],['min',60]];
  for (const [n, sec] of u) { const v = Math.floor(s / sec); if (v >= 1) return `${v} ${n}${v>1?'s':''} ago`; }
  return 'just now';
}
const initials = (name) => name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();

// Seller billing state: 'none' | 'free' | 'paid' | 'expired'
function sellerStatus(u) {
  if (!u || u.role !== 'seller') return 'none';
  if (u.subscriptionStatus === 'active') return 'paid';
  if (u.sellerFreeUntil && u.sellerFreeUntil > Date.now()) return 'free';
  return 'expired';
}
const canSell = (u) => { const s = sellerStatus(u); return s === 'free' || s === 'paid'; };
const freeEndsStr = (u) => u && u.sellerFreeUntil ? new Date(u.sellerFreeUntil).toLocaleDateString() : '';

/* ───────────────────────── Logo ───────────────────────── */
function Logo({ cls = 'h-9 w-9', spin = false, bare = false }) {
  const scale = bare ? 1.5 : 1;
  const spokes = []; for (let i = 0; i < 16; i++) { const a = (i/16)*Math.PI*2; spokes.push(<line key={i} x1={(Math.cos(a)*9.5).toFixed(2)} y1={(Math.sin(a)*9.5).toFixed(2)} x2={(Math.cos(a)*15).toFixed(2)} y2={(Math.sin(a)*15).toFixed(2)} stroke="#1f2430" strokeWidth="2.4" />); }
  const lugs = []; for (let i = 0; i < 5; i++) { const a = (i/5)*Math.PI*2 - Math.PI/2; lugs.push(<circle key={i} cx={(Math.cos(a)*5.6).toFixed(2)} cy={(Math.sin(a)*5.6).toFixed(2)} r="1.2" fill="#5c86f8" />); }
  return (
    <svg viewBox="0 0 48 48" className={cls} aria-hidden="true">
      <defs><linearGradient id="ttRim" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#3b63f1" /><stop offset="1" stopColor="#1d33d3" /></linearGradient></defs>
      {!bare && <rect width="48" height="48" rx="12" fill="url(#ttRim)" />}
      <g transform={`translate(24 24) scale(${scale})`}>
        <g className={spin ? 'animate-spinslow' : ''} style={spin ? { transformBox:'fill-box', transformOrigin:'center' } : undefined}>
          <circle r="15.5" fill="#0d0f13" /><circle r="15.5" fill="none" stroke="#000" strokeOpacity="0.4" strokeWidth="1.5" />
          {spokes}
          <circle r="8.5" fill="#2a2f3c" /><circle r="8.5" fill="none" stroke="#3a4150" strokeWidth="1" /><circle r="3.4" fill="#0d0f13" />
          {lugs}
        </g>
      </g>
    </svg>
  );
}

/* ───────────────────────── Header ───────────────────────── */

  const { me } = useApp();
  const [open, setOpen] = useState(false);
  const active = canSell(me);
  return (

        <nav className="flex items-center gap-1 sm:gap-2">
          {me ? <>
            <a href="#/browse" className="hidden rounded-lg px-3 py-1.5 text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white md:block">Browse</a>
            <a href="#/messages" className="hidden rounded-lg px-3 py-1.5 text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white md:block">Messages</a>
            <a href="#/dashboard" className="hidden rounded-lg px-3 py-1.5 text-sm font-medium text-slate-300 hover:bg-white/5 hover:text-white md:block">Dashboard</a>
            {active ? <a href="#/sell" className="btn-primary"><span className="text-base leading-none">+</span><span className="hidden sm:inline">Sell tires</span></a>
                    : <a href="#/subscribe" className="btn-accent">Become a seller</a>}
            <div className="relative">
              <button onClick={() => setOpen(o => !o)} onBlur={() => setTimeout(() => setOpen(false), 160)} className="flex items-center gap-2 rounded-full p-0.5 pr-2 transition hover:bg-white/10">
                <span className="grid h-8 w-8 place-items-center rounded-full bg-gradient-to-br from-brand-500 to-brand-700 text-xs font-bold text-white">{initials(me.name)}</span>
              </button>
              {open && <div className="absolute right-0 mt-2 w-48 overflow-hidden rounded-xl border border-white/10 bg-white/[0.05] py-1 backdrop-blur-xl shadow-2xl">
                <div className="border-b border-white/10 px-3 py-2"><p className="text-sm font-semibold text-white">{me.name}</p><p className="text-xs text-slate-400">{me.role === 'seller' ? 'Seller' : 'Buyer'}</p></div>
                <a href="#/dashboard" className="block px-3 py-2 text-sm text-slate-200 hover:bg-white/5 md:hidden">Dashboard</a>
                <a href="#/messages" className="block px-3 py-2 text-sm text-slate-200 hover:bg-white/5 md:hidden">Messages</a>
                <LogoutBtn />
              </div>}
            </div>
          </> : <>
            <a href="#/browse" className="hidden px-2 text-sm font-medium text-slate-300 hover:text-white sm:block">Browse</a>

/* ───────────────────────── State map + Landing ───────────────────────── */
function StateMap({ counts, selected, loggedIn }) {

  const go = (a) => { if (loggedIn) setUserState(a); navigate('/browse?state=' + a); };
  const cls = (a) => { const n = counts[a]||0; if (!n) return 'bg-white/[0.04] text-slate-500 hover:bg-white/10 hover:text-slate-300'; const t=n/max; if(t>0.66) return 'bg-brand-500 text-white hover:bg-brand-400'; if(t>0.33) return 'bg-brand-500/60 text-white hover:bg-brand-500/80'; return 'bg-brand-500/30 text-brand-100 hover:bg-brand-500/50'; };
  const focus = hover || selected; const fc = focus ? (counts[focus]||0) : 0;
  return (
    <div className="card p-4 sm:p-6">
      <div className="mb-4 flex flex-wrap items-end justify-between gap-3">
        <div><p className="eyebrow">Step 1 · Choose your state</p><h2 className="font-display text-xl font-bold text-white">{focus ? <>{stateName(focus)} <span className="text-sm font-medium text-slate-400">· {fc} listing{fc!==1?'s':''}</span></> : 'Where are you shopping?'}</h2></div>
        {selected && <button onClick={()=>go(selected)} className="btn-primary">Browse {stateName(selected)} →</button>}
      </div>
      <div className="-mx-1 overflow-x-auto pb-1">
        <div className="mx-auto grid gap-1.5" style={{gridTemplateColumns:`repeat(${GRID_COLS},minmax(0,1fr))`, gridTemplateRows:`repeat(${GRID_ROWS},minmax(0,1fr))`, minWidth:540, maxWidth:760}}>
          {STATES.map(s => { const n = counts[s.abbr]||0; const isSel = selected===s.abbr; return (
            <button key={s.abbr} onClick={()=>go(s.abbr)} onMouseEnter={()=>setHover(s.abbr)} onMouseLeave={()=>setHover(selected)} title={`${stateName(s.abbr)} — ${n} listing${n!==1?'s':''}`} style={{gridColumn:s.col+1, gridRow:s.row+1}} className={`relative grid aspect-square place-items-center rounded-lg text-[11px] font-bold transition ${cls(s.abbr)} ${isSel?'ring-2 ring-accent-400 ring-offset-2 ring-offset-[#13161c]':''}`}>
              {s.abbr}
              {n>0 && <span className="absolute -right-1 -top-1 grid h-4 min-w-4 place-items-center rounded-full bg-ink-950 px-1 text-[9px] font-bold text-white ring-1 ring-white/15">{n}</span>}
              {isSel && <span className="absolute -bottom-1 left-1/2 h-1.5 w-1.5 -translate-x-1/2 rounded-full bg-accent-400" />}
            </button>
          ); })}
        </div>
      </div>
      <div className="mt-4 flex flex-wrap items-center justify-between gap-3">
        <div className="flex items-center gap-2 text-xs text-slate-400"><span>Fewer</span><span className="h-3 w-5 rounded bg-white/[0.06]" /><span className="h-3 w-5 rounded bg-brand-500/30" /><span className="h-3 w-5 rounded bg-brand-500/60" /><span className="h-3 w-5 rounded bg-brand-500" /><span>More listings</span></div>
        <button onClick={()=>navigate('/browse')} className="text-sm font-semibold text-brand-300 hover:underline">Browse all states →</button>
      </div>
    </div>
  );
}

function Landing({ force }) {
  const { db, me } = useApp();
  const selected = userStateOf(me);
  // Logged-in members with a home state skip the map and go to their listings.
  useEffect(() => { if (!force && me && selected) navigate('/browse?state=' + selected); }, [force, me, selected]);
  if (!force && me && selected) return null;
  const activeListings = db.listings.filter(l => l.status === 'active');
  const counts = {}; activeListings.forEach(l => { if (l.state) counts[l.state] = (counts[l.state]||0)+1; });
  const statesWith = Object.keys(counts).length;
  return (
    <div className="space-y-7">
      <section className="relative overflow-hidden rounded-3xl bg-ink-900 text-white">
        <div className="mesh absolute inset-0" /><div className="tread absolute inset-0 opacity-40" />

          <div className="animate-fadeup">
            <span className="inline-flex items-center gap-2 rounded-full bg-white/10 px-3 py-1 text-xs font-semibold text-brand-100 ring-1 ring-inset ring-white/15"><span className="h-1.5 w-1.5 rounded-full bg-accent-400" />{activeListings.length} listings across {statesWith} states</span>
            <h1 className="mt-4 font-display text-3xl font-extrabold leading-[1.05] tracking-tight sm:text-5xl">Find tires <span className="bg-gradient-to-r from-brand-300 to-accent-400 bg-clip-text text-transparent">near you</span></h1>
            <p className="mt-4 max-w-xl text-slate-300">{me && selected ? <>Pick a state to browse. Your home state, <span className="font-semibold text-white">{stateName(selected)}</span>, is marked — choosing a new one updates your profile.</> : <>Pick your state to see new &amp; used tires for sale locally. Browsing is always free — sellers list for $10/month (first year on us).</>}</p>
            <div className="mt-6 flex flex-wrap gap-3">{selected && <a href={`#/browse?state=${selected}`} className="btn-accent">Browse {stateName(selected)} tires</a>}<a href="#/browse" className="btn-secondary bg-white/10 text-white ring-white/20 hover:bg-white/15">Browse all states</a></div>
          </div>
          <div className="hidden justify-center lg:flex"><div className="relative"><div className="absolute -inset-6 rounded-full bg-brand-500/25 blur-3xl" /><Logo cls="relative h-44 w-44" spin bare /></div></div>
        </div>
      </section>
      <StateMap counts={counts} selected={selected} loggedIn={!!me} />
    </div>
  );
}

/* ───────────────────────── Browse (marketplace) ───────────────────────── */
function Marketplace({ stateParam }) {
  const { db } = useApp();
  const st = stateParam && isStateAbbr(stateParam) ? stateParam.toUpperCase() : null;
  const [q, setQ] = useState(''); const [brand, setBrand] = useState(''); const [cond, setCond] = useState('');
  const [size, setSize] = useState(''); const [maxPrice, setMaxPrice] = useState(''); const [sort, setSort] = useState('');
  useEffect(()=>{ setQ('');setBrand('');setCond('');setSize('');setMaxPrice('');setSort(''); }, [st]);
  const filtered = q || brand || cond || size || maxPrice || sort;
  const brands = useMemo(() => [...new Set(db.listings.filter(l => l.status==='active').map(l => l.brand))].sort(), [db]);

  let list = db.listings.filter(l => l.status === 'active');
  if (st) list = list.filter(l => l.state === st);
  if (brand) list = list.filter(l => l.brand === brand);
  if (cond) list = list.filter(l => l.condition === cond);
  if (size) list = list.filter(l => l.size.toLowerCase().includes(size.toLowerCase()));
  if (maxPrice) list = list.filter(l => l.priceCents <= Math.round(Number(maxPrice) * 100));
  if (q) { const Q = q.toLowerCase(); list = list.filter(l => [l.brand,l.size,l.location,l.description].join(' ').toLowerCase().includes(Q)); }
  list = [...list].sort((a,b) => sort==='price_asc' ? a.priceCents-b.priceCents : sort==='price_desc' ? b.priceCents-a.priceCents : b.createdAt-a.createdAt);

  return (
    <div className="space-y-5">
      <div className="flex flex-wrap items-center justify-between gap-3">
        <div>
          <nav className="flex items-center gap-1.5 text-sm text-slate-400"><a href="#/states" className="hover:text-brand-300">Map</a><span>/</span><span className="font-medium text-slate-200">{st ? stateName(st) : 'All states'}</span></nav>
          <h1 className="mt-1 font-display text-2xl font-extrabold text-white">{st ? `Tires in ${stateName(st)}` : 'All listings'}</h1>
          <p className="text-sm text-slate-400">{list.length} tire set{list.length!==1?'s':''}{filtered ? ' match your filters' : ' available'}</p>
        </div>
        <a href="#/states" className="btn-secondary"><svg viewBox="0 0 20 20" className="h-4 w-4 fill-current"><path d="M10 2 3 6v12h5v-5h4v5h5V6l-7-4Z"/></svg>{st ? 'Change state' : 'Open map'}</a>
      </div>

      <div id="listings" className="card p-3 sm:p-4">
        <form onSubmit={e=>e.preventDefault()} className="flex gap-2">
          <div className="relative flex-1">
            <svg viewBox="0 0 20 20" className="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 fill-slate-400"><path d="M9 3a6 6 0 1 0 3.7 10.7l3.3 3.3 1.4-1.4-3.3-3.3A6 6 0 0 0 9 3Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z" /></svg>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search brand, size (225/45R17), or location…" className="input pl-10" />
          </div>
        </form>
        <div className="mt-3 grid grid-cols-2 gap-2 sm:grid-cols-5">
          <select className="input" value={brand} onChange={e=>setBrand(e.target.value)}><option value="">All brands</option>{brands.map(b=><option key={b} value={b}>{b}</option>)}</select>
          <select className="input" value={cond} onChange={e=>setCond(e.target.value)}><option value="">New &amp; Used</option><option value="new">New</option><option value="used">Used</option></select>
          <input className="input" placeholder="Size e.g. R17" value={size} onChange={e=>setSize(e.target.value)} />
          <input className="input" placeholder="Max $" type="number" value={maxPrice} onChange={e=>setMaxPrice(e.target.value)} />
          <select className="input" value={sort} onChange={e=>setSort(e.target.value)}><option value="">Sort: Newest</option><option value="price_asc">Price: Low → High</option><option value="price_desc">Price: High → Low</option></select>
        </div>
        {filtered && <button onClick={()=>{setQ('');setBrand('');setCond('');setSize('');setMaxPrice('');setSort('');}} className="mt-3 text-sm font-medium text-slate-400 hover:text-brand-300">✕ Clear all filters</button>}
      </div>

      {list.length === 0 ? (
        <div className="card grid place-items-center px-6 py-16 text-center"><Logo cls="h-14 w-14 opacity-60" /><p className="mt-4 font-display text-lg font-bold text-slate-200">{st ? `No tires in ${stateName(st)} yet` : 'No tires match your filters'}</p><p className="mt-1 text-sm text-slate-400">Try another state or broaden your search.</p><a href="#/states" className="btn-secondary mt-4">Browse the map</a></div>
      ) : (
        <div className="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4">{list.map(l => <Card key={l.id} l={l} />)}</div>
      )}
    </div>
  );
}

          )}

      </div>

/* ───────────────────────── Subscribe ───────────────────────── */
function Subscribe() {
  const { me, subscribe, becomeSeller } = useApp();
  const status = sellerStatus(me);
  useEffect(() => { if (!me) navigate('/login'); else if (status === 'free' || status === 'paid') navigate('/dashboard'); }, [me]);
  if (!me || status === 'free' || status === 'paid') return null;
  const expired = status === 'expired';

function lastTime(db, t) { const m = db.messages.filter(x=>x.threadId===t.id); return m.length ? m[m.length-1].createdAt : t.createdAt; }

function Thread({ id }) {
  const { me, db, otherOf, sendMessage } = useApp();
  const [text, setText] = useState('');
  const bottom = useRef(null);
  const t = db.threads.find(x => x.id === id);
  useEffect(() => { if (!me) navigate('/login'); }, [me]);
  const msgs = t ? db.messages.filter(m => m.threadId === t.id) : [];
  useEffect(() => { bottom.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs.length]);
  if (!me) return null;
  if (!t) return <Empty title="Conversation not found" />;
  const l = db.listings.find(x => x.id === t.listingId); const other = otherOf(t);
  function send(e) { e.preventDefault(); if (!text.trim()) return; sendMessage(t.id, text.trim()); setText(''); }
  return (
    <div className="mx-auto max-w-2xl">
      <a href="#/messages" className="text-sm text-brand-300 hover:underline">← All messages</a>
      <a href={`#/listings/${l.id}`} className="card mt-2 flex items-center gap-3 p-3 transition hover:border-white/20"><div className="h-12 w-12 shrink-0 overflow-hidden rounded-lg bg-white/5 ring-1 ring-white/10"><img src={tireSVG(l.brand,l.size,l.condition,l.photoIdx)} alt="" className="h-full w-full object-cover" /></div><div className="min-w-0 flex-1"><p className="truncate font-semibold text-white">{l.brand} · {l.size}</p><p className="text-sm text-slate-400">{fmt(l.priceCents)} · with {other.name}</p></div></a>
      <div className="card mt-3 flex h-[60vh] flex-col overflow-hidden">
        <div className="flex-1 space-y-2 overflow-y-auto bg-black/20 p-4">
          {msgs.length===0 && <p className="mt-10 text-center text-sm text-slate-500">Start the conversation with {other.name}.</p>}
          {msgs.map(m => { const mine = m.senderId===me.id; return (
            <div key={m.id} className={`flex ${mine?'justify-end':'justify-start'}`}><div className={`max-w-[78%] rounded-2xl px-3.5 py-2 text-sm ${mine?'rounded-br-md bg-brand-600 text-white':'rounded-bl-md bg-white/[0.07] text-slate-100 ring-1 ring-white/10'}`}>{m.body}<div className={`mt-0.5 text-[10px] ${mine?'text-brand-100':'text-slate-500'}`}>{new Date(m.createdAt).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}</div></div></div>
          ); })}
          <div ref={bottom} />
        </div>
        <form onSubmit={send} className="flex gap-2 border-t border-white/10 bg-white/[0.02] p-3"><input value={text} onChange={e=>setText(e.target.value)} placeholder="Type a message…" className="input" /><button className="btn-primary px-4">Send</button></form>
      </div>
    </div>
  );
}

/* ───────────────────────── Root app + actions ───────────────────────── */
function App() {
  const [db, setDb] = useState(loadDB);
  const route = useHashRoute();
  const persist = (next) => { localStorage.setItem(LS_KEY, JSON.stringify(next)); setDb(next); };
  const update = (mutator) => { const next = JSON.parse(JSON.stringify(db)); mutator(next); persist(next); };
  const me = db.users.find(u => u.id === db.session) || null;

  const actions = {
    db, me,
    login: ({ email, password }) => { const u = db.users.find(x => x.email === (email||'').toLowerCase()); if (!u || u.password !== password) return { error: 'Invalid email or password.' }; update(d => { d.session = u.id; }); return {}; },
    signup: ({ email, password, name, location, role, state }) => { email=(email||'').toLowerCase(); if (!name||!email||!password) return {error:'Name, email and password are required.'}; if (password.length<6) return {error:'Password must be at least 6 characters.'}; if (db.users.some(u=>u.email===email)) return {error:'An account with that email already exists.'}; const isSeller = role==='seller'; const u={id:cuid(),email,password,name,location:location||null,state:isStateAbbr(state)?state.toUpperCase():null,role:isSeller?'seller':'buyer',sellerFreeUntil:isSeller?Date.now()+FREE_MS:null,subscriptionStatus:'inactive'}; update(d=>{ d.users.push(u); d.session=u.id; }); return {}; },
    setUserState: (abbr) => update(d => { const u = d.users.find(x=>x.id===d.session); if (u && isStateAbbr(abbr)) u.state = abbr.toUpperCase(); }),
    logout: () => { update(d => { d.session = null; }); navigate('/'); },
    becomeSeller: () => update(d => { const u = d.users.find(x=>x.id===d.session); if (u && !(sellerStatus(u)==='free'||sellerStatus(u)==='paid')) { u.role='seller'; u.sellerFreeUntil = u.sellerFreeUntil || (Date.now()+FREE_MS); } }),
    subscribe: () => update(d => { const u = d.users.find(x=>x.id===d.session); if (u) u.subscriptionStatus = 'active'; }),
    update,
    otherOf: (t) => db.users.find(u => u.id === (t.buyerId === db.session ? t.sellerId : t.buyerId)),
    startThread: (listingId, message) => {
      const l = db.listings.find(x => x.id === listingId); if (!l || l.sellerId === db.session) return null;
      let existing = db.threads.find(t => t.listingId === listingId && t.buyerId === db.session);
      let tid = existing ? existing.id : cuid();
      update(d => {
        if (!existing) d.threads.push({ id: tid, listingId, buyerId: d.session, sellerId: l.sellerId, createdAt: Date.now() });
        if (message && message.trim()) d.messages.push({ id: cuid(), threadId: tid, senderId: d.session, body: message.trim(), createdAt: Date.now() });
      });
      scheduleReply(tid, l.sellerId);
      return tid;
    },
    sendMessage: (tid, body) => { const th = db.threads.find(t=>t.id===tid); update(d => { d.messages.push({ id: cuid(), threadId: tid, senderId: d.session, body, createdAt: Date.now() }); }); if (th) { const otherId = th.buyerId === db.session ? th.sellerId : th.buyerId; scheduleReply(tid, otherId); } },
    saveListing: (id, f) => {
      const data = { brand:f.brand, size:f.size, quantity:Math.max(1,parseInt(f.quantity)||1), condition:f.condition==='new'?'new':'used', treadDepth:f.treadDepth||null, priceCents:Math.round(Number(f.price)*100), location:f.location, state:stateFromLocation(f.location), description:f.description||null, status:f.status==='sold'?'sold':'active', photoIdx:f.photoIdx };
      let nid = id;
      update(d => { if (id) { const l = d.listings.find(x=>x.id===id); Object.assign(l, data); } else { nid = cuid(); d.listings.unshift({ id:nid, sellerId:d.session, views:0, createdAt:Date.now(), ...data }); } });
      return nid;
    },
    reset: () => { const fresh = seedDB(); persist(fresh); navigate('/'); },
  };

  // canned auto-reply so conversations feel alive
  const replyTimers = useRef({});
  function scheduleReply(tid, fromUserId) {
    if (replyTimers.current[tid]) return;
    replyTimers.current[tid] = setTimeout(() => {
      replyTimers.current[tid] = null;
      const lines = ["Thanks for reaching out! Yep, still available.", "Sounds good — when works for pickup?", "I can do a small discount for cash. 👍", "Let me grab a few more photos for you."];
      setDb(prev => { const next = JSON.parse(JSON.stringify(prev)); const last = next.messages.filter(m=>m.threadId===tid).slice(-1)[0]; if (last && last.senderId === fromUserId) return prev; next.messages.push({ id: cuid(), threadId: tid, senderId: fromUserId, body: lines[Math.floor(Date.now()/1000)%lines.length], createdAt: Date.now() }); localStorage.setItem(LS_KEY, JSON.stringify(next)); return next; });
    }, 1400);
  }

  let view;
  const [routePath, routeQuery] = route.split('?');
  const qp = new URLSearchParams(routeQuery || '');
  const seg = routePath.split('/').filter(Boolean);
  if (routePath === '/' || seg.length === 0) view = <Landing />;
  else if (seg[0] === 'states') view = <Landing force />;
  else if (seg[0] === 'browse') view = <Marketplace stateParam={qp.get('state')} />;
  else if (seg[0] === 'listings' && seg[1]) view = <Detail id={seg[1]} />;
  else if (seg[0] === 'login') view = <Auth mode="login" />;
  else if (seg[0] === 'signup') view = <Auth mode="signup" />;
  else if (seg[0] === 'subscribe') view = <Subscribe />;
  else if (seg[0] === 'sell') view = <Sell id={seg[1]} />;
  else if (seg[0] === 'dashboard') view = <Dashboard />;
  else if (seg[0] === 'messages' && seg[1]) view = <Thread id={seg[1]} />;
  else if (seg[0] === 'messages') view = <Messages />;
  else view = <Empty title="Page not found" />;

  return (
    <Ctx.Provider value={actions}>
      <div className="flex min-h-screen flex-col">
        <Header />
        <main className="mx-auto w-full max-w-6xl flex-1 px-4 py-6 sm:py-8">{view}</main>
        <Footer />
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
