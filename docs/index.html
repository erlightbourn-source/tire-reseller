  if (u.subscriptionStatus === 'active') return 'paid';
  if (u.sellerFreeUntil && u.sellerFreeUntil > Date.now()) return 'free';
  return 'expired';
}
const canSell = (u) => { const s = sellerStatus(u); return s === 'free' || s === 'paid'; };

  const spokes = []; for (let i = 0; i < 16; i++) { const a = (i/16)*Math.PI*2; spokes.push(<line key={i} x1={(Math.cos(a)*9.5).toFixed(2)} y1={(Math.sin(a)*9.5).toFixed(2)} x2={(Math.cos(a)*15).toFixed(2)} y2={(Math.sin(a)*15).toFixed(2)} stroke="#1f2430" strokeWidth="2.4" />); }
  const lugs = []; for (let i = 0; i < 5; i++) { const a = (i/5)*Math.PI*2 - Math.PI/2; lugs.push(<circle key={i} cx={(Math.cos(a)*5.6).toFixed(2)} cy={(Math.sin(a)*5.6).toFixed(2)} r="1.2" fill="#5c86f8" />); }

  const stateParam = params.get('state'), fits = params.get('fits');
  const st = stateParam && isStateAbbr(stateParam) ? stateParam.toUpperCase() : null;

  const [size, setSize] = useState(params.get('size')||''); const [maxPrice, setMaxPrice] = useState(''); const [sort, setSort] = useState('');
  const [season, setSeason] = useState(''); const [runFlat, setRunFlat] = useState(false); const [more, setMore] = useState(false);
  const [minTread, setMinTread] = useState(''); const [minYear, setMinYear] = useState(''); const [qty, setQty] = useState('');
  const [minRating, setMinRating] = useState(''); const [shipping, setShipping] = useState(false);
  const [near, setNear] = useState(null); const [radius, setRadius] = useState('50'); const [locating, setLocating] = useState(false);

  const ratingOf = (sid) => { const rs=(db.reviews||[]).filter(r=>r.sellerId===sid); return rs.length? rs.reduce((s,r)=>s+r.rating,0)/rs.length : 0; };

  function useMyLocation(){ if(!navigator.geolocation) return; setLocating(true); navigator.geolocation.getCurrentPosition(p=>{ setLocating(false); setNear({lat:p.coords.latitude,lng:p.coords.longitude}); }, ()=>setLocating(false), {timeout:8000}); }
  const brands = useMemo(() => [...new Set(db.listings.filter(l => l.status==='active').map(l => l.brand))].sort(), [db]);

  const blocked = blockedByMe();
  const proOf = (l) => db.users.find(u=>u.id===l.sellerId)?.pro ? 1 : 0;
  let list = db.listings.filter(l => l.status === 'active' && !l.hidden && !blocked.includes(l.sellerId));
  if (st && !near) list = list.filter(l => l.state === st);
  if (brand) list = list.filter(l => l.brand === brand);
  if (cond) list = list.filter(l => l.condition === cond);
  if (size) list = list.filter(l => l.size.toLowerCase().includes(size.toLowerCase()));
  if (season) list = list.filter(l => l.season === season);
  if (runFlat) list = list.filter(l => l.runFlat);
  if (minTread) { const mn = Number(minTread); list = list.filter(l => { const n = parseTread(l.treadDepth)?.n; return n != null && n >= mn; }); }
  if (minYear) list = list.filter(l => l.dotYear && l.dotYear >= Number(minYear));
  if (qty) list = list.filter(l => (l.quantity||0) >= Number(qty));
  if (shipping) list = list.filter(l => l.shipping);
  if (minRating) list = list.filter(l => ratingOf(l.sellerId) >= Number(minRating));

          )}

function Spec({ k, v, h, warn }) { return <div className="rounded-xl bg-white/[0.04] px-3 py-2 ring-1 ring-inset ring-white/10"><dt className="text-xs text-slate-400">{k}</dt><dd className="font-semibold text-slate-100">{v}{h && <span className={`ml-1 text-xs font-medium ${warn?'text-amber-300':'text-slate-400'}`}>· {h}</span>}</dd></div>; }

  );
}

/* ───────────────────────── Messages ───────────────────────── */
function Messages() {
  const { me, db, otherOf } = useApp();

  if (!me) return null;
  const mine = db.threads.filter(t => t.buyerId === me.id || t.sellerId === me.id).sort((a,b)=>(lastTime(db,b)-lastTime(db,a)));
  return (
    <div className="mx-auto max-w-2xl">

        <div className="space-y-2">{mine.map(t => {
          const l = db.listings.find(x=>x.id===t.listingId); const other = otherOf(t);
          const msgs = db.messages.filter(m=>m.threadId===t.id); const last = msgs[msgs.length-1];

              <div className="h-14 w-14 shrink-0 overflow-hidden rounded-lg bg-white/5 ring-1 ring-white/10"><img src={tireSVG(l.brand,l.size,l.condition,l.photoIdx)} alt="" className="h-full w-full object-cover" /></div>
              <div className="min-w-0 flex-1"><div className="flex items-center justify-between gap-2"><p className="truncate font-semibold text-white">{l.brand} · {l.size}</p><span className="whitespace-nowrap text-xs text-slate-400">{timeAgo(lastTime(db,t))}</span></div><p className="text-xs text-slate-500">{t.buyerId===me.id?'Seller':'Buyer'}: {other.name} · {fmt(l.priceCents)}</p><p className="truncate text-sm text-slate-500">{last ? last.body : 'No messages yet'}</p></div>
            </a>
          );
        })}</div>
      )}
    </div>
  );
}
function lastTime(db, t) { const m = db.messages.filter(x=>x.threadId===t.id); return m.length ? m[m.length-1].createdAt : t.createdAt; }

function Thread({ id }) {
  const { me, db, otherOf, sendMessage, makeOffer, respondOffer, markThreadRead } = useApp();
  const [text, setText] = useState('');
  const [offerOpen, setOfferOpen] = useState(false);
  const [counterFor, setCounterFor] = useState(null); const [counterAmt, setCounterAmt] = useState('');
  const t = db.threads.find(x => x.id === id);
  useEffect(() => { if (me && t) markThreadRead(t.id); }, [id, me]);
  const offerExp = (m) => { const left = OFFER_TTL_MS-(Date.now()-m.createdAt); if(left<=0) return {expired:true,label:'Expired'}; const h=Math.floor(left/3.6e6); return {expired:false,label:h>=1?`Expires in ${h}h`:'Expires soon'}; };
  const [offer, setOffer] = useState(t ? Math.round((db.listings.find(x=>x.id===t.listingId)?.priceCents||0)/100) : '');
  const bottom = useRef(null);
  useEffect(() => { if (!me) navigate('/login'); }, [me]);
  const msgs = t ? db.messages.filter(m => m.threadId === t.id) : [];
  useEffect(() => { bottom.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs.length]);
  if (!me) return null;
  if (!t) return <Empty title="Conversation not found" />;
  const l = db.listings.find(x => x.id === t.listingId); const other = otherOf(t);
  function send(e) { e.preventDefault(); if (!text.trim()) return; sendMessage(t.id, text.trim()); setText(''); }
  const money = (c) => '$'+(c/100).toLocaleString();
  return (
    <div className="mx-auto max-w-2xl">
      <a href="#/messages" className="text-sm text-brand-300 hover:underline">← All messages</a>
      <a href={`#/listings/${l.id}`} className="card mt-2 flex items-center gap-3 p-3 transition hover:border-white/20"><div className="h-12 w-12 shrink-0 overflow-hidden rounded-lg bg-white/5 ring-1 ring-white/10"><img src={tireSVG(l.brand,l.size,l.condition,l.photoIdx)} alt="" className="h-full w-full object-cover" /></div><div className="min-w-0 flex-1"><p className="truncate font-semibold text-white">{l.brand} · {l.size}</p><p className="text-sm text-slate-400">{fmt(l.priceCents)} · with {other.name}</p></div></a>

                  <p className="text-xs font-semibold uppercase tracking-wide text-accent-300">{mine?'Your offer':'Offer'}</p>

                  {live && <p className="text-[10px] text-slate-400">{exp.label}</p>}
                  {m.offerStatus==='pending' && exp.expired && <p className="text-xs text-slate-400">Expired</p>}
                  {live && !mine && counterFor!==m.id && <div className="mt-2 flex flex-wrap gap-2"><button onClick={()=>respondOffer(m.id,'accept')} className="btn bg-emerald-500 px-3 py-1 text-xs text-ink-950 hover:bg-emerald-400">Accept</button><button onClick={()=>{ setCounterFor(m.id); setCounterAmt(Math.round(m.offerCents/100)); }} className="btn bg-brand-600 px-3 py-1 text-xs text-white hover:bg-brand-500">Counter</button><button onClick={()=>respondOffer(m.id,'decline')} className="btn bg-white/10 px-3 py-1 text-xs text-slate-200 hover:bg-white/20">Decline</button></div>}

function App() {
  const [db, setDb] = useState(loadDB);
  const route = useHashRoute();
  const persist = (next) => { localStorage.setItem(LS_KEY, JSON.stringify(next)); setDb(next); };
  const update = (mutator) => { const next = JSON.parse(JSON.stringify(db)); mutator(next); persist(next); };
  const me = db.users.find(u => u.id === db.session) || null;

  const actions = {
    db, me,
    login: ({ email, password }) => { const u = db.users.find(x => x.email === (email||'').toLowerCase()); if (!u || u.password !== password) return { error: 'Invalid email or password.' }; update(d => { d.session = u.id; }); return {}; },
    signup: ({ email, password, name, location, role, state }) => { email=(email||'').toLowerCase(); if (!name||!email||!password) return {error:'Name, email and password are required.'}; if (password.length<6) return {error:'Password must be at least 6 characters.'}; if (db.users.some(u=>u.email===email)) return {error:'An account with that email already exists.'}; const isSeller = role==='seller'; const u={id:cuid(),email,password,name,location:location||null,state:isStateAbbr(state)?state.toUpperCase():null,role:isSeller?'seller':'buyer',sellerFreeUntil:isSeller?Date.now()+FREE_MS:null,subscriptionStatus:'inactive'}; update(d=>{ d.users.push(u); d.session=u.id; }); return {}; },
    setUserState: (abbr) => update(d => { const u = d.users.find(x=>x.id===d.session); if (u && isStateAbbr(abbr)) u.state = abbr.toUpperCase(); }),
    logout: () => { update(d => { d.session = null; }); navigate('/'); },
    becomeSeller: () => update(d => { const u = d.users.find(x=>x.id===d.session); if (u && !(sellerStatus(u)==='free'||sellerStatus(u)==='paid')) { u.role='seller'; u.sellerFreeUntil = u.sellerFreeUntil || (Date.now()+FREE_MS); } }),
    subscribe: () => update(d => { const u = d.users.find(x=>x.id===d.session); if (u) u.subscriptionStatus = 'active'; }),
    update,
    otherOf: (t) => db.users.find(u => u.id === (t.buyerId === db.session ? t.sellerId : t.buyerId)),
    startThread: (listingId, message) => {
      const l = db.listings.find(x => x.id === listingId); if (!l || l.sellerId === db.session) return null;
      if ((db.blocks||[]).some(b => (b.blockerId===db.session && b.blockedId===l.sellerId) || (b.blockerId===l.sellerId && b.blockedId===db.session))) { alert("You can't message this seller."); return null; }
      let existing = db.threads.find(t => t.listingId === listingId && t.buyerId === db.session);
      let tid = existing ? existing.id : cuid();
      update(d => {
        if (!existing) d.threads.push({ id: tid, listingId, buyerId: d.session, sellerId: l.sellerId, createdAt: Date.now() });
        if (message && message.trim()) d.messages.push({ id: cuid(), threadId: tid, senderId: d.session, body: message.trim(), createdAt: Date.now() });
      });
      scheduleReply(tid, l.sellerId);
      return tid;
    },
    sendMessage: (tid, body) => { const th = db.threads.find(t=>t.id===tid); update(d => { d.messages.push({ id: cuid(), threadId: tid, senderId: d.session, body, createdAt: Date.now() }); }); if (th) { const otherId = th.buyerId === db.session ? th.sellerId : th.buyerId; scheduleReply(tid, otherId); } },
    saveListing: (id, f) => {
      const co = CITY_COORDS[f.location] || [null, null];
      const SEASONS = ['summer','winter','all-season','all-weather'];
      const data = { brand:f.brand, size:f.size, quantity:Math.max(1,parseInt(f.quantity)||1), condition:f.condition==='new'?'new':'used', treadDepth:f.treadDepth||null, priceCents:Math.round(Number(f.price)*100), location:f.location, state:stateFromLocation(f.location), lat:co[0], lng:co[1], season:SEASONS.includes(f.season)?f.season:null, loadIndex:f.loadIndex?String(f.loadIndex).trim():null, speedRating:f.speedRating?String(f.speedRating).trim().toUpperCase():null, runFlat:!!f.runFlat, shipping:!!f.shipping, dotYear:f.dotYear&&Number(f.dotYear)?Math.round(Number(f.dotYear)):null, description:f.description||null, status:f.status==='sold'?'sold':'active', photoIdx:f.photoIdx };
      let nid = id;
      update(d => { if (id) { const l = d.listings.find(x=>x.id===id); Object.assign(l, data); } else { nid = cuid(); d.listings.unshift({ id:nid, sellerId:d.session, views:0, featured:false, createdAt:Date.now(), ...data }); } });
      return nid;
    },
    isFavorited: (lid) => !!(db.favorites||[]).find(x=>x.userId===db.session && x.listingId===lid),
    toggleFavorite: (lid) => { if(!db.session){ navigate('/login'); return; } update(d => { d.favorites = d.favorites||[]; const i = d.favorites.findIndex(x=>x.userId===d.session && x.listingId===lid); if(i>=0) d.favorites.splice(i,1); else d.favorites.push({ userId:d.session, listingId:lid }); }); },
    togglePromote: (lid) => update(d => { const l = d.listings.find(x=>x.id===lid); if(l) l.featured = !l.featured; }),
    markThreadRead: (tid) => update(d => { d.messages.forEach(m => { if(m.threadId===tid && m.senderId!==d.session) m.read = true; }); }),
    report: (lid, reason) => { if(!db.session){ navigate('/login'); return {error:'login'}; } update(d => { d.reports = d.reports||[]; if(!d.reports.find(r=>r.listingId===lid && r.reporterId===d.session)) d.reports.push({ id:cuid(), listingId:lid, reporterId:d.session, reason }); const cnt = d.reports.filter(r=>r.listingId===lid).length; if(cnt>=3){ const l=d.listings.find(x=>x.id===lid); if(l) l.hidden=true; } }); return {}; },
    isBlocked: (uid) => !!(db.blocks||[]).find(b=>b.blockerId===db.session && b.blockedId===uid),
    blockedByMe: () => (db.blocks||[]).filter(b=>b.blockerId===db.session).map(b=>b.blockedId),
    toggleBlock: (uid) => update(d => { d.blocks = d.blocks||[]; const i=d.blocks.findIndex(b=>b.blockerId===d.session && b.blockedId===uid); if(i>=0) d.blocks.splice(i,1); else d.blocks.push({ id:cuid(), blockerId:d.session, blockedId:uid }); }),
    setPro: (on) => update(d => { const u=d.users.find(x=>x.id===d.session); if(u) u.pro=!!on; }),
    bulkAdd: (text) => { const lines=String(text||'').split('\n').map(l=>l.trim()).filter(Boolean); let count=0, errors=0; update(d => { for(const ln of lines.slice(0,50)){ const p=ln.split('|').map(s=>s.trim()); const [brand,size,price,qty,cond,loc]=p; if(!brand||!size||!price||!loc){ errors++; continue; } const co=CITY_COORDS[loc]||[null,null]; d.listings.unshift({ id:cuid(), sellerId:d.session, brand, size, quantity:Math.max(1,parseInt(qty)||4), condition:cond==='new'?'new':'used', treadDepth:null, priceCents:Math.round(Number(price)*100)||0, location:loc, state:stateFromLocation(loc), lat:co[0], lng:co[1], season:null, runFlat:false, featured:false, hidden:false, views:0, createdAt:Date.now(), photoIdx:Math.floor(Math.random()*14) }); count++; } }); return { count, errors }; },
    sellerRating: (sid) => { const rs = (db.reviews||[]).filter(r=>r.sellerId===sid); return { avg: rs.length? rs.reduce((s,r)=>s+r.rating,0)/rs.length : 0, count: rs.length, list: rs.slice().sort((a,b)=>b.createdAt-a.createdAt) }; },
    myReview: (sid) => (db.reviews||[]).find(r=>r.sellerId===sid && r.authorId===db.session) || null,
    addReview: (sid, rating, body) => { if(!db.session) { navigate('/login'); return {error:'login'}; } update(d => { d.reviews = d.reviews||[]; const ex = d.reviews.find(r=>r.sellerId===sid && r.authorId===d.session); if(ex){ ex.rating=rating; ex.body=body||null; } else d.reviews.push({ id:cuid(), sellerId:sid, authorId:d.session, rating, body:body||null, createdAt:Date.now() }); }); return {}; },
    recordView: (lid) => update(d => { d.views = d.views||[]; d.views.push({ id:cuid(), listingId:lid, createdAt:Date.now() }); const l=d.listings.find(x=>x.id===lid); if(l) l.views=(l.views||0)+1; }),
    saveSearch: (query) => { if(!db.session){ navigate('/login'); return; } const sp=new URLSearchParams(query); const allow=['q','brand','condition','size','maxPrice','minTread','minYear','qty','minRating','shipping','season','runFlat','state']; const p={}; allow.forEach(k=>{ if(sp.get(k)) p[k]=sp.get(k); }); const clean=new URLSearchParams(p).toString(); const label=describeSearchDemo(p); update(d=>{ d.savedSearches=d.savedSearches||[]; if(!d.savedSearches.find(s=>s.userId===d.session && s.query===clean)) d.savedSearches.push({ id:cuid(), userId:d.session, query:clean, label, createdAt:Date.now(), lastSeenAt:Date.now() }); }); },
    deleteSearch: (id) => update(d => { d.savedSearches = (d.savedSearches||[]).filter(s=>s.id!==id); }),
    seenSearch: (id) => update(d => { const s=(d.savedSearches||[]).find(x=>x.id===id); if(s) s.lastSeenAt=Date.now(); }),
    newCount: (s) => { const p=Object.fromEntries(new URLSearchParams(s.query)); return db.listings.filter(l=>l.status==='active' && matchSearch(l,p) && l.createdAt>s.lastSeenAt).length; },
    makeOffer: (tid, cents) => update(d => { d.messages.push({ id:cuid(), threadId:tid, senderId:d.session, kind:'offer', offerCents:cents, offerStatus:'pending', body:`Offer: $${(cents/100).toLocaleString()}`, createdAt:Date.now() }); const th=d.threads.find(t=>t.id===tid); if(th) th.updatedAt=Date.now(); }),
    respondOffer: (mid, action, cents) => update(d => { const m=d.messages.find(x=>x.id===mid); if(!m||m.kind!=='offer'||m.offerStatus!=='pending') return; if(action==='counter'){ if(!cents||cents<=0) return; m.offerStatus='countered'; d.messages.push({ id:cuid(), threadId:m.threadId, senderId:d.session, kind:'offer', offerCents:cents, offerStatus:'pending', body:`Counter-offer: $${(cents/100).toLocaleString()}`, createdAt:Date.now() }); return; } const acc=action==='accept'; m.offerStatus=acc?'accepted':'declined'; d.messages.push({ id:cuid(), threadId:m.threadId, senderId:d.session, body: acc?`✅ Accepted your offer of $${(m.offerCents/100).toLocaleString()}. Let's arrange pickup!`:`Declined the offer of $${(m.offerCents/100).toLocaleString()}.`, createdAt:Date.now() }); if(acc){ const th=d.threads.find(t=>t.id===m.threadId); const l=th&&d.listings.find(x=>x.id===th.listingId); if(l) l.status='sold'; } }),
    exportData: () => {
      const me = db.users.find(u=>u.id===db.session); if(!me) return;
      const data = {
        exportedAt: new Date().toISOString(),
        profile: { id:me.id, email:me.email, name:me.name, location:me.location, state:me.state, role:me.role, pro:me.pro, createdAt:me.createdAt },
        listings: db.listings.filter(l=>l.sellerId===me.id),
        favorites: (db.favorites||[]).filter(f=>f.userId===me.id),
        savedSearches: (db.savedSearches||[]).filter(s=>s.userId===me.id),
        reviewsWritten: (db.reviews||[]).filter(r=>r.authorId===me.id),
        reviewsReceived: (db.reviews||[]).filter(r=>r.sellerId===me.id),
        sentMessages: (db.messages||[]).filter(m=>m.senderId===me.id),
      };
      const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a');
      a.href = url; a.download = `tiretrader-data-${me.id.slice(0,8)}.json`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    },
    deleteAccount: () => { const id = db.session; if(!id) return; update(d => {
      d.listings = d.listings.filter(l=>l.sellerId!==id);
      const myThreads = (d.threads||[]).filter(t=>t.buyerId===id||t.sellerId===id).map(t=>t.id);
      d.threads = (d.threads||[]).filter(t=>t.buyerId!==id&&t.sellerId!==id);
      d.messages = (d.messages||[]).filter(m=>!myThreads.includes(m.threadId) && m.senderId!==id);
      d.favorites = (d.favorites||[]).filter(f=>f.userId!==id);
      d.savedSearches = (d.savedSearches||[]).filter(s=>s.userId!==id);
      d.reviews = (d.reviews||[]).filter(r=>r.authorId!==id && r.sellerId!==id);
      d.reports = (d.reports||[]).filter(r=>r.reporterId!==id);
      d.blocks = (d.blocks||[]).filter(b=>b.blockerId!==id && b.blockedId!==id);
      d.users = d.users.filter(u=>u.id!==id);
      d.session = null;
    }); navigate('/'); },
    changePassword: (current, next) => { const u = db.users.find(x=>x.id===db.session); if(!u) return {error:'Not logged in.'}; if(u.password!==current) return {error:'Current password is incorrect.'}; if(!next||next.length<6) return {error:'New password must be at least 6 characters.'}; update(d=>{ const x=d.users.find(y=>y.id===d.session); x.password=next; }); return {}; },
    resetByEmail: (email, next) => { const e=(email||'').toLowerCase(); const u=db.users.find(x=>x.email===e); if(!u) return {error:'No account with that email.'}; if(!next||next.length<6) return {error:'Password must be at least 6 characters.'}; update(d=>{ const x=d.users.find(y=>y.email===e); x.password=next; d.session=x.id; }); return {}; },
    reset: () => { const fresh = seedDB(); persist(fresh); navigate('/'); },
  };

  // canned auto-reply so conversations feel alive
  const replyTimers = useRef({});
  function scheduleReply(tid, fromUserId) {
    if (replyTimers.current[tid]) return;
    replyTimers.current[tid] = setTimeout(() => {
      replyTimers.current[tid] = null;
      const lines = ["Thanks for reaching out! Yep, still available.", "Sounds good — when works for pickup?", "I can do a small discount for cash. 👍", "Let me grab a few more photos for you."];
      setDb(prev => { const next = JSON.parse(JSON.stringify(prev)); const last = next.messages.filter(m=>m.threadId===tid).slice(-1)[0]; if (last && last.senderId === fromUserId) return prev; next.messages.push({ id: cuid(), threadId: tid, senderId: fromUserId, body: lines[Math.floor(Date.now()/1000)%lines.length], createdAt: Date.now() }); localStorage.setItem(LS_KEY, JSON.stringify(next)); return next; });
    }, 1400);
  }

  let view;
  const [routePath, routeQuery] = route.split('?');
  const qp = new URLSearchParams(routeQuery || '');
  const seg = routePath.split('/').filter(Boolean);
  if (routePath === '/' || seg.length === 0) view = <HomePage />;
  else if (seg[0] === 'states') view = <StatesPage />;
  else if (seg[0] === 'sell-tires') view = <SellTires />;
  else if (seg[0] === 'guide') view = <GuidePage />;
  else if (seg[0] === 'browse') view = <Marketplace params={qp} />;
  else if (seg[0] === 'favorites') view = <Favorites />;
  else if (seg[0] === 'saved') view = <SavedSearches />;
  else if (seg[0] === 'sellers' && seg[1]) view = <SellerProfile id={seg[1]} />;
  else if (seg[0] === 'app') view = <AppPage />;
  else if (seg[0] === 'listings' && seg[1]) view = <Detail id={seg[1]} />;
  else if (seg[0] === 'login') view = <Auth mode="login" />;
  else if (seg[0] === 'signup') view = <Auth mode="signup" />;
  else if (seg[0] === 'subscribe') view = <Subscribe />;
  else if (seg[0] === 'pro') view = <ProPage />;
  else if (seg[0] === 'sell' && seg[1] === 'bulk') view = <BulkAddPage />;
  else if (seg[0] === 'sell') view = <Sell id={seg[1]} />;
  else if (seg[0] === 'terms') view = <LegalPage title="Terms of Service" sections={TERMS_SECTIONS} numbered />;
  else if (seg[0] === 'privacy') view = <LegalPage title="Privacy Policy" sections={PRIVACY_SECTIONS} />;
  else if (seg[0] === 'forgot') view = <ForgotDemo />;
  else if (seg[0] === 'settings') view = <SettingsPage />;
  else if (seg[0] === 'dashboard') view = <Dashboard />;
  else if (seg[0] === 'messages' && seg[1]) view = <Thread id={seg[1]} />;
  else if (seg[0] === 'messages') view = <Messages />;
  else view = <Empty title="Page not found" />;

  return (
    <Ctx.Provider value={actions}>
      <div className="flex min-h-screen flex-col">
        <Header />
        <main className="mx-auto w-full max-w-6xl flex-1 px-4 py-6 sm:py-8">{view}</main>
        <Footer />
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
